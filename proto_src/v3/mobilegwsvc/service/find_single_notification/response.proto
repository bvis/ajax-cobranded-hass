syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_single_notification;

import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/notification.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_single_notification";
option java_multiple_files = true;
option swift_prefix = "";

message FindSingleNotificationResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    ecosystem.v2.communicationsvc.mobile.commonmodels.notification.Notification notification = 1;
  }

  message Failure {

    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error not_found = 3;
    }
  }
};
