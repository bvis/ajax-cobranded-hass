syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_edge_fan_speed_settings;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/system/fan_speed_settings.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_edge_fan_speed_settings";
option java_multiple_files = true;
option swift_prefix = "";

message GetVideoEdgeFanSpeedSettingsResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    commonmodels.video.videoedge.system.FanSpeedSettings fan_speed_settings = 3;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error space_not_found = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.Error video_edge_not_found = 4;
      commonmodels.Error fan_speed_settings_not_found = 5;
    }
  }
}
