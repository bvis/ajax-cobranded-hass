syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_applicable_devices_by_template;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/company/templates/device_identifier.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_applicable_devices_by_template";
option java_multiple_files = true;
option swift_prefix = "";

message FindAllDevicesByTemplateTypeResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated commonmodels.company.templates.DeviceIdentifier devices = 1;
  }

  message Failure {
    oneof error {
      mobilegwsvc.commonmodels.Error illegal_argument = 1;
      mobilegwsvc.commonmodels.Error permission_denied = 2;
    }
  }
}
