syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_edge_accelerometer_settings;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/system/accelerometer_settings.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_edge_accelerometer_settings";
option java_multiple_files = true;
option swift_prefix = "";

message GetVideoEdgeAccelerometerSettingsResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    commonmodels.video.videoedge.system.AccelerometerSettings accelerometer_settings = 1;
  }

  message Failure {

    reserved 3; // space_armed
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_not_found = 4;
      commonmodels.Error video_edge_not_found = 5;
    }
  }
};
