syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_available_extra_services_on_space;

import "v3/mobilegwsvc/commonmodels/accounting/available_extra_service_group.proto";
import "v3/mobilegwsvc/commonmodels/accounting/find_available_services_context.proto";
import "v3/mobilegwsvc/commonmodels/accounting/failure/not_available_for_user_error.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_available_extra_services_on_space";
option java_multiple_files = true;
option swift_prefix = "";

message GetAvailableExtraServicesOnSpaceResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated commonmodels.accounting.AvailableExtraServiceGroup available_extra_service_groups = 1;
    commonmodels.accounting.FindAvailableServicesContext current_context = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error available_mandatory_service_not_found = 2;
      commonmodels.Error reseller_not_found = 3;
      commonmodels.Error dealer_not_found = 4;
      commonmodels.accounting.failure.NotAvailableForUserError not_available_for_user = 5;
    }
  }
}
