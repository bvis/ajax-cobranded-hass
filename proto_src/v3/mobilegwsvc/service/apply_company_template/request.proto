syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.apply_company_template;

import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/object_type.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.apply_company_template";
option java_multiple_files = true;
option swift_prefix = "";

message ApplyCompanyTemplateRequest {
  string template_id = 1;
  string hub_id = 2;
  repeated HubObject objects = 3;

  message HubObject {
    string id = 1;
    ecosystem.v2.hubsvc.commonmodels.ObjectType type = 2;
  }
}
