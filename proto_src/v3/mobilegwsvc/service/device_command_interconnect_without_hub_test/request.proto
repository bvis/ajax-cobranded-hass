syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.device_command_interconnect_without_hub_test;

import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/object_type.proto";

option java_multiple_files = true;
option swift_prefix = "";

message DeviceCommandInterconnectWithoutHubTestRequest {
  string hub_id = 1;
  string device_id = 2;
  ecosystem.v2.hubsvc.commonmodels.ObjectType object_type = 3;
  IWHTestCommand iwh_test_command = 4;

  enum IWHTestCommand {
    IWH_TEST_COMMAND_UNSPECIFIED = 0;
    IWH_TEST_COMMAND_START = 1;
    IWH_TEST_COMMAND_STOP = 2;
  }
}
