syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_edge_detection_settings;

import "systems/ajax/logging/proto/log_marker.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_edge_detection_settings";
option java_multiple_files = true;
option swift_prefix = "";

message GetVideoEdgeDetectionSettingsRequest {

  // [required]
  string space_id = 1 [(log_marker) = LOG_MARKER_SPACE_ID];

  // [required]
  string video_edge_id = 2 [(log_marker) = LOG_MARKER_VIDEO_EDGE_ID];

  // [required]
  string channel_id = 3;
}
