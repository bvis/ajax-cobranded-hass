syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_onvif_and_rtsp_ports;

import "systems/ajax/logging/proto/log_marker.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_onvif_and_rtsp_ports";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoEdgeOnvifAndRtspPortsRequest {
  string space_id = 1 [(log_marker) = LOG_MARKER_SPACE_ID];

  string video_edge_id = 2 [(log_marker) = LOG_MARKER_VIDEO_EDGE_ID];

  uint32 onvif_http_port = 3;

  uint32 rtsp_http_port = 4;
}
