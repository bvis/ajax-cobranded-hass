syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_onvif_and_rtsp_ports;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/onvif/onvif_settings.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/rtsp/rtsp_settings.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_onvif_and_rtsp_ports";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoEdgeOnvifAndRtspPortsResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    commonmodels.video.videoedge.onvif.OnvifSettings onvif_settings = 1;

    commonmodels.video.videoedge.rtsp.RtspSettings rtsp_settings = 2;
  }

  message Failure {

    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_armed = 3;
      commonmodels.Error space_not_found = 4;
      commonmodels.Error video_edge_not_found = 5;
      commonmodels.Error video_edge_is_offline = 6;
      commonmodels.Error unimplemented_video_edge_command = 7;
      commonmodels.Error invalid_onvif_port = 8;
      commonmodels.Error invalid_rtsp_port = 9;
    }
  }
};
