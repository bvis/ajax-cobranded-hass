syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_fire_zone;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/virtualobject/fire_zone.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_fire_zone";
option java_multiple_files = true;
option swift_prefix = "";

message StreamFireZoneResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    FireZones snapshot = 1;
  }

  message FireZones {
    repeated v3.mobilegwsvc.commonmodels.virtualobject.FireZone fire_zones = 1;
  }

  message Failure {
    string message = 100;
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error hub_not_found = 2;
      commonmodels.Error illegal_argument = 3;
      commonmodels.Error request_timeout = 4;
    }
  }
}
