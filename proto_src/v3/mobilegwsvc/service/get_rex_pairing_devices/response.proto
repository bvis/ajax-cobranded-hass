syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_rex_pairing_devices;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/virtualobject/selected_device.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_rex_pairing_devices";
option java_multiple_files = true;
option swift_prefix = "";

message GetRexPairingDevicesResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated commonmodels.virtualobject.SelectedDevice devices = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
    }
  }
}
