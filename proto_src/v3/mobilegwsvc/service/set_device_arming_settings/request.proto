syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_device_arming_settings;

import "systems/ajax/api/ecosystem/v2/commonmodels/device/common/common_arming_part.proto";
import "systems/ajax/api/mobile/v2/common/space/device/video_edge_channel.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_device_arming_settings";
option java_multiple_files = true;
option swift_prefix = "";

message SetDeviceArmingSettingsRequest {
  string space_id = 1;

  systems.ajax.api.ecosystem.v2.commonmodels.device.common.CommonArmingPart.CommonArmingPartSettings settings = 2;

  oneof device_locator {
    mobile.v2.common.space.device.VideoEdgeChannel video_edge_channel = 11;
  }
}
