syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.reset_video_edge_firmware_update_status;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.video.service.reset_video_edge_firmware_update_status";
option java_multiple_files = true;
option swift_prefix = "";

message ResetFirmwareUpdateStatusResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success { }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error space_not_found = 2;
      commonmodels.Error video_edge_not_found = 3;
      commonmodels.Error permission_denied = 4;
      commonmodels.Error space_armed = 5;
      commonmodels.Error firmware_update_in_progress = 6;
      commonmodels.Error video_edge_is_offline = 7;
    }
  }
}
