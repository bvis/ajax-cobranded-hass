syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.login_by_password;

import "v3/mobilegwsvc/commonmodels/type/user_role.proto";
import "systems/ajax/logging/proto/formatting_options.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.user.service.login_by_password";
option java_multiple_files = true;
option swift_prefix = "";

message LoginByPasswordRequest {
  string email = 1 [(hash_value) = true];

  string password_sha256_hash = 2 [(disable_logging) = true];

  commonmodels.type.UserRole user_role = 3;
}
