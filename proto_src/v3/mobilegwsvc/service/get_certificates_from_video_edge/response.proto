syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_certificates_from_video_edge;

import "systems/ajax/api/mobile/v2/common/video/types.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/crypto/x509_certificate.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_certificates_from_video_edge";
option java_multiple_files = true;
option swift_prefix = "";

message GetCertificatesFromVideoEdgeResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated commonmodels.video.videoedge.crypto.X509Version supported_x509_versions = 1;

    // e.g.: 1024, 2048 bits
    repeated uint32 supported_rsa_key_lengths = 2;

    repeated mobile.v2.common.video.CryptoHashAlgorithm supported_signature_algorithms = 3;

    // List of certificates that can be used on server-side (i.e. the ones that have an associated private key). This does not include
    // e.g. CA certificates.
    repeated commonmodels.video.videoedge.crypto.X509Certificate server_certificates = 4;

    // UploadCertificateWithPrivateKeyInPKCS12 command is supported.
    bool pkcs12_supported = 5;

    // CreatePKCS10CSR and UploadSignedCertificate commands are supported.
    bool pkcs10_supported = 6;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error space_not_found = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.Error video_edge_is_offline = 4;
      commonmodels.Error unimplemented_video_edge_command = 5;
    }
  }
};
