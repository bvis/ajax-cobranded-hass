syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_space_integration_oauth_authorization_code_url;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "";

message GetSpaceIntegrationOAuthAuthorizationCodeUrlResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    string url = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
    }
  }
}
