syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.suspend_target;

import "systems/ajax/api/mobile/v2/common/accounting/feature_target.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.suspend_target";
option java_multiple_files = true;
option swift_prefix = "";

message SuspendTargetRequest {
  string feature_target_id = 1;
  systems.ajax.api.mobile.v2.common.accounting.FeatureTarget feature_target = 2;
  oneof service_id {
    string feature_id = 3;
    string package_id = 4;
  }
}
