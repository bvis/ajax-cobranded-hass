syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.add_video_edge_line_crossing_rule;

import "systems/ajax/api/mobile/v2/common/video/types.proto";
import "systems/ajax/logging/proto/log_marker.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/channel/detection/line_crossing_direction.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.add_video_edge_line_crossing_rule";
option java_multiple_files = true;
option swift_prefix = "";

message AddVideoEdgeLineCrossingRuleRequest {

  // [required]
  string space_id = 1 [(log_marker) = LOG_MARKER_SPACE_ID];

  // [required]
  string video_edge_id = 2 [(log_marker) = LOG_MARKER_VIDEO_EDGE_ID];

  // [required]
  string channel_id = 3;

  // [required]
  string name = 4;

  // [required]
  // non-intersecting polyline (2 points minimum). Valid values for coordinates are in range [0, 1] inclusive.
  repeated mobile.v2.common.video.Point2f points = 5;

  // [required]
  commonmodels.video.videoedge.channel.detection.LineCrossingDirection direction = 6;

  // [required]
  repeated mobile.v2.common.video.ObjectClass object_classes = 7;
}
