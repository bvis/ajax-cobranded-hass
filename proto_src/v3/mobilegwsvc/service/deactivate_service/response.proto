syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.deactivate_service;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.deactivate_service";
option java_multiple_files = true;
option swift_prefix = "";

message DeactivateServiceResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error service_not_found = 2;
      commonmodels.Error dealer_not_found = 3;
      commonmodels.Error deactivate_failed = 4;
    }
  }
}
