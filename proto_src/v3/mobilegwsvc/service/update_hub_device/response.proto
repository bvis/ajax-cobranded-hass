syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_hub_device;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_hub_device";
option java_multiple_files = true;
option swift_prefix = "";

message UpdateHubDeviceResponse {

  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Success {
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error device_no_found = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.Error hub_offline = 4;
      HubWrongStateError hub_wrong_state = 5;
    }

    message HubWrongStateError {
      repeated commonmodels.ErrorCause error_cause = 1;
    }
  }
}
