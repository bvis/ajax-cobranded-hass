syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_company_template_by_id;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/company/templates/company_template.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_company_template_by_id";
option java_multiple_files = true;
option swift_prefix = "";

message GetCompanyTemplateByIdResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    v3.mobilegwsvc.commonmodels.company.templates.CompanyTemplate template = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error illegal_argument = 1;
      commonmodels.Error not_found = 2;
      commonmodels.Error permission_denied = 3;
    }
  }
}
