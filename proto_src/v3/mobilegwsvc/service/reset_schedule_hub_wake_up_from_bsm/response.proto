syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.reset_schedule_hub_wake_up_from_bsm;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.reset_schedule_hub_wake_up_from_bsm";
option java_multiple_files = true;
option swift_prefix = "";

message ResetScheduleHubWakeUpFromBsmResponse {

  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;

      // discuss about these errors
      commonmodels.HubWrongStateError hub_wrong_state = 3;
      commonmodels.HubBusyError hub_busy = 4;
    }
  }
}
