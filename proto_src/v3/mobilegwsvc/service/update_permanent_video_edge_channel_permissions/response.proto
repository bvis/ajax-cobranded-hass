syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_permanent_video_edge_channel_permissions;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_permanent_video_edge_channel_permissions";
option java_multiple_files = true;
option swift_prefix = "";

message UpdatePermanentVideoEdgeChannelPermissionsResponse {

  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error video_edge_not_found = 3;
      commonmodels.Error channel_not_found = 4;
      commonmodels.Error assignee_space_member_not_found = 5;
      commonmodels.Error space_armed = 6;
    }
  }
}
