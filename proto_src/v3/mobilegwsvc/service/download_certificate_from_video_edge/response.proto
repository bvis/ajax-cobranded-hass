syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.download_certificate_from_video_edge;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.download_certificate_from_video_edge";
option java_multiple_files = true;
option swift_prefix = "";

message DownloadCertificateFromVideoEdgeResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    // Entire certification path (https://datatracker.ietf.org/doc/html/rfc5280#section-3.2) of requested certificate.
    // certificates_pem[0] is always present and it's the requested certificate itself.
    // Each certificate is in PEM format, i.e. "-----BEGIN CERTIFICATE----- ... -----END CERTIFICATE-----".
    repeated string certificates_pem = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error space_not_found = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.Error video_edge_is_offline = 4;
      commonmodels.Error unimplemented_video_edge_command = 5;
      commonmodels.Error certificate_not_found = 6;
    }
  }
};
