syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_video_player;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/service/stream_video_player/player_video_edge.proto";
import "v3/mobilegwsvc/service/stream_video_player/updates.proto";

option java_multiple_files = true;
option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_video_player";
option swift_prefix = "";

message StreamVideoPlayerResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    oneof update {
      InitialState initial_state = 1;
      Updates updates = 2;
    }

    message InitialState {
      repeated PlayerVideoEdge video_edges = 1;
    }
  }

  message Failure {
    oneof error {
      systems.ajax.api.ecosystem.v3.mobilegwsvc.commonmodels.Error bad_request = 1;
      systems.ajax.api.ecosystem.v3.mobilegwsvc.commonmodels.Error permission_denied = 2;
      systems.ajax.api.ecosystem.v3.mobilegwsvc.commonmodels.Error space_not_found = 3;
    }
  }
}
