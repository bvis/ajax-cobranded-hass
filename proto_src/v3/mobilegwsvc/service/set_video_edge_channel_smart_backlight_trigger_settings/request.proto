option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_channel_smart_backlight_trigger_settings";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoEdgeChannelSmartBacklightTriggerSettingsRequest {
