syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_max_video_cloud_archive_depth;

import "google/protobuf/duration.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_max_video_cloud_archive_depth";
option java_multiple_files = true;
option swift_prefix = "";

message SetMaxVideoCloudArchiveDepthResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    google.protobuf.Duration cloud_archive_depth = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_not_found = 3;
      commonmodels.Error space_armed = 4;
      commonmodels.Error cloud_archive_not_found = 5;
      commonmodels.Error max_cloud_archive_depth_limit_exceeded = 6;
      commonmodels.Error video_edge_not_found = 7;
    }
  }
}
