syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_max_video_cloud_archive_depth;

import "systems/ajax/logging/proto/log_marker.proto";
import "v3/mobilegwsvc/commonmodels/video/duration_option.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_max_video_cloud_archive_depth";
option java_multiple_files = true;
option swift_prefix = "";

message SetMaxVideoCloudArchiveDepthRequest {

  string space_id = 1 [(log_marker) = LOG_MARKER_SPACE_ID];

  string video_edge_id = 2 [(log_marker) = LOG_MARKER_VIDEO_EDGE_ID];

  string channel_id = 3;

  commonmodels.video.DurationOption max_cloud_archive_depth = 4;
}
