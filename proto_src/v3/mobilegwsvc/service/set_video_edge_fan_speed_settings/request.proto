syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_fan_speed_settings;

import "systems/ajax/logging/proto/log_marker.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/system/fan_speed_settings.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_fan_speed_settings";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoEdgeFanSpeedSettingsRequest {

  string space_id = 1 [(log_marker) = LOG_MARKER_SPACE_ID];

  string video_edge_id = 2 [(log_marker) = LOG_MARKER_VIDEO_EDGE_ID];

  commonmodels.video.videoedge.system.FanSpeedSettings fan_speed_settings = 3;
