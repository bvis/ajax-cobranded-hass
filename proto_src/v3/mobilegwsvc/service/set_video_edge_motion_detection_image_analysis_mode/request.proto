syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_motion_detection_image_analysis_mode;

import "systems/ajax/api/mobile/v2/common/video/videoedge/channel/detection/image_analysis_mode.proto";
import "systems/ajax/logging/proto/log_marker.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_motion_detection_image_analysis_mode";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoEdgeMotionDetectionImageAnalysisModeRequest {

  // [required]
  string space_id = 1 [(log_marker) = LOG_MARKER_SPACE_ID];

  // [required]
  string video_edge_id = 2 [(log_marker) = LOG_MARKER_VIDEO_EDGE_ID];

  // [required]
  string channel_id = 3;

  // [required]
  mobile.v2.common.video.videoedge.channel.detection.ImageAnalysisMode image_analysis_mode = 4;
}
