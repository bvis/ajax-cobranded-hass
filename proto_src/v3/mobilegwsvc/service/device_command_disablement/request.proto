syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.device_command_disablement;

import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/object_type.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.device_command_disablement";
option java_multiple_files = true;
option swift_prefix = "";

message DeviceCommandDisablementRequest {
  string hub_id = 1;
  string device_id = 2;
  ecosystem.v2.hubsvc.commonmodels.ObjectType device_type = 3;
  repeated En54DisablementEndpoint en54_disablement_endpoints = 4;

  enum En54DisablementEndpoint {
    reserved 3; // rapid rise disablement

    EN54_DISABLEMENT_ENDPOINT_UNSPECIFIED = 0;
    EN54_DISABLEMENT_ENDPOINT_SMOKE = 1;
    EN54_DISABLEMENT_ENDPOINT_TEMPERATURE = 2;
    EN54_DISABLEMENT_ENDPOINT_SOUNDER = 4;
    EN54_DISABLEMENT_ENDPOINT_VAD = 5;
    EN54_DISABLEMENT_ENDPOINT_OUTPUT_1 = 6;
    EN54_DISABLEMENT_ENDPOINT_OUTPUT_2 = 7;
    EN54_DISABLEMENT_ENDPOINT_INPUT = 8;
    EN54_DISABLEMENT_ENDPOINT_MCP = 9;
  }
}
