syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_vaelsys_camera_token;

import "systems/ajax/logging/proto/formatting_options.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_vaelsys_camera_token";
option java_multiple_files = true;
option swift_prefix = "";

message GetVaelsysCameraTokenResponse {

  oneof response {
    Success success = 1;
    Failure error = 2;
  }

  message Success {
    string token = 1 [(disable_logging) = true];
    string external_user_id = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
    }
  }
};
