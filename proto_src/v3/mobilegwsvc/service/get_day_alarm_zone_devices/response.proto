syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_day_alarm_zone_devices;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/virtualobject/selected_device.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_day_alarm_zone_devices";
option java_multiple_files = true;
option swift_prefix = "";

message GetDayAlarmZoneDevicesResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
      repeated commonmodels.virtualobject.SelectedDevice intrusion_devices = 1;
      repeated commonmodels.virtualobject.SelectedDevice security_devices = 2;
      repeated commonmodels.virtualobject.SelectedDevice siren_devices = 3;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error timeout = 3;
      commonmodels.Error internal = 4;
    }
  }
}
