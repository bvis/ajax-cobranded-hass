syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_account;

import "v3/mobilegwsvc/commonmodels/account/account.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.user.service.get_account";
option java_multiple_files = true;
option swift_prefix = "";

message GetAccountResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    commonmodels.account.Account account = 1;
  }

  message Failure {}
}
