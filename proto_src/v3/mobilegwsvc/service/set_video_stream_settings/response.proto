syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_stream_settings;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_stream_settings";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoStreamSettingsResponse {

    oneof response {
        commonmodels.Success success = 1;
        Failure failure = 2;
    }

    message Failure {
        oneof error {
            commonmodels.Error bad_request = 1;
            commonmodels.Error permission_denied = 2;
            commonmodels.Error space_armed = 3;
            commonmodels.Error space_not_found = 4;
            commonmodels.Error video_edge_not_found = 5;
            commonmodels.Error channel_not_found = 6;
            commonmodels.Error stream_settings_not_found = 7;
            commonmodels.Error device_unavailable = 8;
            commonmodels.Error device_setup_in_progress = 9;
            commonmodels.Error video_edge_is_offline = 10;
        }
    }
}
