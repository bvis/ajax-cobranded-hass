syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_stream_settings;

import "systems/ajax/api/mobile/v2/common/video/videoedge/mediadevice/media_device_settings.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_stream_settings";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoStreamSettingsRequest {
    // [required]
    string space_id = 1;

    // [required]
    string video_edge_id = 2;

    // [required]
    string channel_id = 3;

    mobile.v2.common.video.videoedge.mediadevice.VideoSettings.Stream main_settings = 4;

    mobile.v2.common.video.videoedge.mediadevice.VideoSettings.Stream sub_settings = 5;
}
