syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_channel_monitoring_settings;

import "systems/ajax/logging/proto/log_marker.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/channel/video_monitoring_state.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_channel_monitoring_settings";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoEdgeChannelMonitoringSettingsRequest {

  string space_id = 1;

  string video_edge_id = 2 [(log_marker) = LOG_MARKER_VIDEO_EDGE_ID];

  string channel_id = 3;

  string zone_number = 4;

  commonmodels.video.videoedge.channel.VideoMonitoringState monitoring_state = 5;
}
