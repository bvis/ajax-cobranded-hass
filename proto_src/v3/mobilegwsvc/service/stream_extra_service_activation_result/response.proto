syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_extra_service_activation_result;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/accounting/extra_service.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_extra_service_activation_result";
option java_multiple_files = true;
option swift_prefix = "";

message StreamExtraServiceActivationResultResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    oneof result {
      ExtraServiceActivated extra_service_activated = 10;
      ExtraServiceFailedToActivate extra_service_failed_to_activate = 11;
      ExtraServiceActivationInProgress extra_service_activation_in_progress = 12;
    }
  }

  message ExtraServiceActivated {
    v3.mobilegwsvc.commonmodels.accounting.ExtraService new_extra_service = 1;
  }

  message ExtraServiceFailedToActivate {}

  message ExtraServiceActivationInProgress {}

  message Failure {
    string message = 100;
    oneof error {
      commonmodels.Error request_timeout = 1;
      commonmodels.Error illegal_argument = 2;
    }
  }
}
