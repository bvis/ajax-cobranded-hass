syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.device_command_brightness;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
option java_multiple_files = true;
option swift_prefix = "";

message DeviceCommandBrightnessResponse {
  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error permission_denied = 1; // 0635
      commonmodels.HubWrongStateError hub_wrong_state = 2; // 11
      commonmodels.HubBusyError hub_busy = 3; // 0F
    }
  }
}
