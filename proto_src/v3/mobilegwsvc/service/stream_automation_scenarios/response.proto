syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_automation_scenarios;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/scheduled_acesss/scheduled_access.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_automation_scenarios";
option java_multiple_files = true;
option swift_prefix = "";

message StreamHubAutomationScenariosResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    oneof entity {
      Snapshot snapshot = 1;
      Created created = 2;
      Updated updated = 3;
      Deleted deleted = 4;
    }
  }

  message Snapshot {
    repeated AutomationScenarioObject automation_scenarios = 1;
  }

  message Created {
    AutomationScenarioObject automation_scenario = 1;
  }

  message Updated {
    AutomationScenarioObject automation_scenario = 1;
  }

  message Deleted {
    oneof id {
      int32 scheduled_access_id = 1;
    }
  }

  message AutomationScenarioObject {
    oneof object {
      commonmodels.scheduled_access.ScheduledAccess scheduled_access = 1;
    }
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error hub_not_found = 2;
      commonmodels.Error request_timeout = 3;
      commonmodels.Error permission_denied = 4;
    }
  }
}
