syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_detection_area_test;

import "google/protobuf/timestamp.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_detection_area_test";
option java_multiple_files = true;
option swift_prefix = "";

message StreamDetectionAreaTestResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }
  message Success {

    oneof success {
      Snapshot snapshot = 1;
      Update update = 2;
    }

    message Snapshot { // should be a last available photo info
      DetectionArea detection_area = 1;
    }

    message Update {
      DetectionArea detection_area = 1;
    }

    message DetectionArea {
      State state = 1;
      optional PhotoInfo photo_info = 2;
    }

    message PhotoInfo {
      string url = 1; // don't pass photo info if there is no some props
      google.protobuf.Timestamp creation_time = 2;
    }

    enum State {
      STATE_UNSPECIFIED = 0;
      STATE_IN_PROGRESS = 1;
      STATE_READY = 2;
      STATE_FAILED = 3;
    }
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2; // company on hub not found too
      // other errors will be implemented during review and implementation
    }
  }
}
