syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_day_alarm_zones;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/virtualobject/day_alarm_zone.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_day_alarm_zones";
option java_multiple_files = true;
option swift_prefix = "";

message StreamDayAlarmZonesResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    oneof entity {
      Snapshot snapshot = 1;
      Created created = 2;
      Updated updated = 3;
      Deleted deleted = 4;
    }
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
    }
  }

  message Snapshot {
    bool is_add_available = 1;
    bool is_cms_on = 2;
    repeated v3.mobilegwsvc.commonmodels.virtualobject.DayAlarmZone day_alarm_zones = 3;
  }

  message Created {
    bool is_add_available = 1;
    repeated v3.mobilegwsvc.commonmodels.virtualobject.DayAlarmZone day_alarm_zones = 2;
  }

  message Updated {
    repeated v3.mobilegwsvc.commonmodels.virtualobject.DayAlarmZone day_alarm_zones = 1;
  }

  message Deleted {
    bool is_add_available = 1;
    repeated v3.mobilegwsvc.commonmodels.virtualobject.DayAlarmZone day_alarm_zones = 2;
  }
}
