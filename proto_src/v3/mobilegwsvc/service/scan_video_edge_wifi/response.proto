syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.scan_video_edge_wifi;

import "systems/ajax/api/mobile/v2/common/video/videoedge/network/network_interface.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.scan_video_edge_wifi";
option java_multiple_files = true;
option swift_prefix = "";

message ScanVideoEdgeWifiResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    oneof update {
      // Expected to be the first message, subsequent messages of this type should completely replace the local app state.
      NetworkInterfacesSnapshot network_interfaces_snapshot = 1;

      // Expected to replace only the specified interfaces in the local app state.
      NetworkInterfacesReplaced network_interfaces_replaced = 2;

      // Expected to remove only the specified interfaces in the local app state.
      NetworkInterfacesRemoved network_interfaces_removed = 3;
    }

    message NetworkInterfacesSnapshot {
      repeated api.mobile.v2.common.video.videoedge.network.NetworkInterface network_interfaces = 1;
    }

    message NetworkInterfacesReplaced {
      repeated api.mobile.v2.common.video.videoedge.network.NetworkInterface network_interfaces = 1;
    }

    message NetworkInterfacesRemoved {
      repeated string network_interface_ids = 1;
    }
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_not_found = 3;
      commonmodels.Error space_armed = 4;
      commonmodels.Error video_edge_not_found = 5;
      commonmodels.Error video_edge_is_offline = 6; // When both the main and the backup channels are unavailable.
      commonmodels.Error unimplemented_video_edge_command = 7;
    }
  }
}
