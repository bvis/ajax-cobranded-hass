syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_channel_calendar;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "systems/ajax/api/mobile/v2/common/video/videoedge/archive/calendar.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_channel_calendar";
option java_multiple_files = true;
option swift_prefix = "";

message GetChannelCalendarResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    systems.ajax.api.mobile.v2.common.video.videoedge.archive.Calendar calendar = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_not_found = 3;
      commonmodels.Error channel_not_found = 4;
      commonmodels.Error video_edge_is_offline = 5;
    }
  }
}
