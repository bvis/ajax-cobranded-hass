syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.create_cross_zone;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.create_cross_zone";
option java_multiple_files = true;
option swift_prefix = "";

message CreateCrossZoneResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    string cross_zone_id = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error object_limit_exceeded = 2;
      commonmodels.Error illegal_argument = 3;
      commonmodels.Error request_timeout = 4;
      commonmodels.Error permission_denied = 5;
      commonmodels.Error hub_offline = 6;
      commonmodels.Error hub_error = 7;
      commonmodels.HubBusyError hub_busy = 8;
      commonmodels.HubWrongStateError hub_wrong_state = 9;
      commonmodels.Error hub_not_found = 10;
    }
  }
}
