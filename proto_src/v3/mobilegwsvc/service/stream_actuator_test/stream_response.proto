syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_actuator_test;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "";

message StreamActuatorTestStatusResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    oneof response {
      Snapshot snapshot = 1;
      Update update = 2;
    }
  }

  message Snapshot {
    TestStateInfo test_state_info = 1;
  }

  message Update {
    TestStateInfo test_state_info = 1;
  }

  message TestStateInfo {
    repeated AnnunciationTestEndPoint annunciation_test_endpoints = 1;
    StatusTest status = 2;
  }

  enum AnnunciationTestEndPoint {
    ANNUNCIATION_TEST_END_POINT_UNSPECIFIED = 0;
    ANNUNCIATION_TEST_END_POINT_SOUNDER_TEST = 1;
    ANNUNCIATION_TEST_END_POINT_VAD_TEST = 2;
  }

  enum StatusTest {
    STATUS_TEST_UNSPECIFIED = 0;
    STATUS_TEST_INACTIVE = 1;
    STATUS_TEST_STARTING = 2;
    STATUS_TEST_ACTIVE = 3;
    STATUS_TEST_FINISHING = 4;
  }

  message Failure {
    string message = 100;
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error hub_not_found = 2;
      commonmodels.Error illegal_argument = 3;
      commonmodels.Error request_timeout = 4;
    }
  }
}
