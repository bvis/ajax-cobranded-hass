syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.restore_password;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.user.service.restore_password";
option java_multiple_files = true;
option swift_prefix = "";

message RestorePasswordResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    optional uint32 expected_token_length = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error cannot_send_confirmation_codes = 2;
    }
  }
}
