syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.login_by_sso;

import "systems/ajax/logging/proto/formatting_options.proto";

option java_multiple_files = true;
option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.login_by_sso";
option swift_prefix = "";

message LoginBySsoRequest {
  string email = 1 [(hash_value) = true];
  string client_device_id = 2;
  string relay_state = 3;
  optional string request_id = 4 [(hash_value) = true];
  // object id representation
  optional string company_id = 5;
}   
