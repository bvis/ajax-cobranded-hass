syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_day_alarm_zone;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_day_alarm_zone";
option java_multiple_files = true;
option swift_prefix = "";

message UpdateDayAlarmZoneResponse {

  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error timeout = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.Error hub_offline = 4;
      commonmodels.Error hub_error = 5;
      commonmodels.HubBusyError hub_busy = 6;
      commonmodels.HubWrongStateError hub_wrong_state = 7;
      commonmodels.Error illegal_argument = 8;
    }
  }
}
