syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.save_rex_pairing_devices;

import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/object_type.proto";
import "v3/mobilegwsvc/commonmodels/virtualobject/selected_device.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.save_rex_pairing_devices";
option java_multiple_files = true;
option swift_prefix = "";

message SaveRexPairingDevicesRequest {
  string hub_id = 1;
  string rex_id = 2;
  v2.hubsvc.commonmodels.ObjectType rex_type = 3;

  /*
   * Changed devices.
   * For example if user selected one device and deselected another,
   * the array will contains two SelectedDevices with values [true, false]
   */
  repeated commonmodels.virtualobject.SelectedDevice devices = 4;
}
