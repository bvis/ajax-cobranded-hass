syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_cloud_archive_record_settings;

import "systems/ajax/api/mobile/v2/common/video/videoedge/archive/archive.proto";
import "v3/mobilegwsvc/commonmodels/video/duration_option.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_cloud_archive_record_settings";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoCloudArchiveRecordSettingsRequest {
  // [required]
  string space_id = 1;

  // [required]
  string video_edge_id = 2;

  // [required]
  string channel_id = 3;

  // [required]
  mobile.v2.common.video.videoedge.archive.RecordMode record_mode = 4;

  // [required]
  mobile.v2.common.video.videoedge.archive.RecordPolicy record_policy = 5;

  // [required] If set, limits the maximum duration of a single recording.
  commonmodels.video.DurationOption recording_duration = 6;

  // [required] How long after the previous recording is finished will we be ready to record again.
  commonmodels.video.DurationOption cooldown_interval = 7;
}
