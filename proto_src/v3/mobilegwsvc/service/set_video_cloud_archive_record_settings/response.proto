syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_cloud_archive_record_settings;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_cloud_archive_record_settings";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoCloudArchiveRecordSettingsResponse {

  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_armed = 3;
      commonmodels.Error space_not_found = 4;
      commonmodels.Error video_edge_not_found = 5;
      commonmodels.Error channel_not_found = 6;
      commonmodels.Error video_edge_is_offline = 7;
      commonmodels.Error cloud_archive_not_found = 8;
      commonmodels.Error video_edge_command_not_supported = 9;
    }
  }
}
