syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_cross_zone;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/virtualobject/cross_zone.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_cross_zone";
option java_multiple_files = true;
option swift_prefix = "";

message StreamCrossZoneResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    oneof entity {
      CrossZones snapshot = 1;
      CrossZones created = 2;
      CrossZones updated = 3;
      CrossZones deleted = 4;
    }
  }

  message CrossZones {
    repeated v3.mobilegwsvc.commonmodels.virtualobject.CrossZone cross_zones = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error hub_not_found = 2;
      commonmodels.Error illegal_argument = 4;
      commonmodels.Error request_timeout = 5;
    }
  }
}
