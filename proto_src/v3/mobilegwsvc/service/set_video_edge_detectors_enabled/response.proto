syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_detectors_enabled;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_detectors_enabled";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoEdgeDetectorsEnabledResponse {
  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error video_edge_not_found = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.Error space_armed = 4;
      commonmodels.Error some_detectors_failed_to_update = 5;
      commonmodels.Error video_edge_is_offline = 6;
    }
  }
}
