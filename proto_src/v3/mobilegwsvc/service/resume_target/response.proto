syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.resume_target;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.resume_target";
option java_multiple_files = true;
option swift_prefix = "";

message ResumeTargetResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error illegal_state = 2;
      commonmodels.Error resume_failed = 3;
    }
  }
}
