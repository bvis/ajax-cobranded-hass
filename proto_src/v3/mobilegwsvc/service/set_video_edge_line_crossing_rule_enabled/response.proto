syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_line_crossing_rule_enabled;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_edge_line_crossing_rule_enabled";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoEdgeLineCrossingRuleEnabledResponse {

  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {

    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error space_not_found = 2;
      commonmodels.Error space_armed = 3;
      commonmodels.Error permission_denied = 4;
      commonmodels.Error video_edge_not_found = 5;
      commonmodels.Error channel_not_found = 6;
      commonmodels.Error line_crossing_settings_not_found = 7;
      commonmodels.Error rule_not_found = 8;
      commonmodels.Error video_edge_is_offline = 9;
