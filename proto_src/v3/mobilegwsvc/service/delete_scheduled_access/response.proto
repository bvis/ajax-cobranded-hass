syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.delete_scheduled_access;

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.delete_scheduled_access";
option java_multiple_files = true;
option swift_prefix = "";

import "v3/mobilegwsvc/commonmodels/response/response.proto";

message DeleteScheduledAccessResponse {

  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error permission_denied = 1; // 0635
      commonmodels.Error schedule_access_not_found = 2; // 15
    }
  }
}
