syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_space_member_sms_preferences;

import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_space_member_sms_preferences";
option java_multiple_files = true;
option swift_prefix = "";

message UpdateSpaceMemberSmsPreferencesResponse {

  oneof response {
    mobile.v2.common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      mobile.v2.common.response.DefaultError bad_request = 1;
      mobile.v2.common.response.DefaultError permission_denied = 2;
      mobile.v2.common.response.DefaultError hub_offline = 3;
    }
  }
}
