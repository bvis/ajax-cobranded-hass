syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.refresh_smart_locks;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.refresh_smart_locks";
option java_multiple_files = true;
option swift_prefix = "";

message RefreshSmartLocksResponse {

  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_not_found = 3;
      commonmodels.Error smart_lock_not_found = 4;
    }
  }
}
