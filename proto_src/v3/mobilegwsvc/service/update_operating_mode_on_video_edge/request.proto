syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_operating_mode_on_video_edge;

import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";
import "systems/ajax/api/mobile/v2/common/video/videoedge/mcu/operating_mode.proto";
import "systems/ajax/logging/proto/log_marker.proto";


option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_operating_mode_on_video_edge";
option java_multiple_files = true;
option swift_prefix = "";

message UpdateOperatingModeRequest {

  systems.ajax.api.mobile.v2.common.space.SpaceLocator space_locator = 1;

  string video_edge_id = 2 [(log_marker) = LOG_MARKER_VIDEO_EDGE_ID];

  systems.ajax.api.mobile.v2.common.video.videoedge.mcu.OperatingMode operating_mode = 3;
}
