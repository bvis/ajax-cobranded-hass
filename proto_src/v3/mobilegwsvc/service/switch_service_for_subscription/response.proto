syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.switch_service_for_subscription;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.switch_service_for_subscription";
option java_multiple_files = true;
option swift_prefix = "";

message SwitchServiceForSubscriptionResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    string new_subscription_id = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error illegal_argument = 1;
      commonmodels.Error service_not_found = 2;
      commonmodels.Error subscription_not_found = 3;
      commonmodels.Error reseller_not_found = 4;
      commonmodels.Error dealer_not_found = 5;
      commonmodels.Error linkage_suspended = 6;
      commonmodels.Error illegal_state = 9;
    }
  }
}
