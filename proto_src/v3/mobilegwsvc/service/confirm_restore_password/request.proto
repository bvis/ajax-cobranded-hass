syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.confirm_restore_password;

import "v3/mobilegwsvc/commonmodels/type/user_role.proto";
import "systems/ajax/logging/proto/formatting_options.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.user.service.confirm_restore_password";
option java_multiple_files = true;
option swift_prefix = "";

message ConfirmRestorePasswordRequest {
  string email_or_phone = 1 [(hash_value) = true];

  commonmodels.type.UserRole user_role = 2;

  string phone_token = 3;

  string mail_token = 4;

  string new_password_sha256_hash = 5 [(disable_logging) = true];
}
