syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.remove_backup_channel;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.remove_backup_channel";
option java_multiple_files = true;
option swift_prefix = "";

message RemoveBackupChannelResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success { }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error space_not_found = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.Error video_edge_not_found = 4;
      commonmodels.Error hub_not_found = 5;
      commonmodels.Error space_armed = 6;
      commonmodels.Error hub_error = 7;
      commonmodels.Error hub_is_busy = 8;
      commonmodels.Error wrong_hub_state = 9;
      commonmodels.Error hub_device_not_found = 10;
      commonmodels.Error hub_offline = 11;
    }
  }
};
