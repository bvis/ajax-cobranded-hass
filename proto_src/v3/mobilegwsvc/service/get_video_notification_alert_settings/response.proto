syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_notification_alert_settings;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/channel/notification/notification_event_type.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/channel/notification/video_notification_alert_with_siren.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_notification_alert_settings";
option java_multiple_files = true;
option swift_prefix = "";

message GetVideoNotificationAlertSettingsResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  enum NotificationAlertSettingsCapability {
    NOTIFICATION_ALERT_SETTINGS_CAPABILITY_UNSPECIFIED = 0;
    NOTIFICATION_ALERT_SETTINGS_CAPABILITY_ALERT_WITH_SIREN = 1;
  }

  message Success {
    commonmodels.video.videoedge.channel.notification.AlertWithSiren alert_with_siren = 1;
    repeated NotificationAlertSettingsCapability capabilities = 2;
    commonmodels.video.videoedge.channel.notification.NotificationEventType notification_event_type = 3;
  }

  message Failure {

    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_not_found = 4;
      commonmodels.Error video_edge_not_found = 5;
      commonmodels.Error channel_not_found = 6;
    }
  }
}

