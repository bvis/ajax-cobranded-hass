syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.login_by_totp;

import "v3/mobilegwsvc/commonmodels/type/user_role.proto";
import "systems/ajax/logging/proto/formatting_options.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.user.service.login_by_totp";
option java_multiple_files = true;
option swift_prefix = "";

message LoginByTotpRequest {
  string email = 1  [(hash_value) = true];

  commonmodels.type.UserRole user_role = 2;

  string totp = 3;

  string request_id = 4;
}
