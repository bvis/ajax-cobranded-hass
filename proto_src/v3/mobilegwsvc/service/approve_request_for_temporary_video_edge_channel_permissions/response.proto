syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.approve_request_for_temporary_video_edge_channel_permissions;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.approve_request_for_temporary_video_edge_channel_permissions";
option java_multiple_files = true;
option swift_prefix = "";

message ApproveRequestForTemporaryVideoEdgeChannelPermissionsResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {}

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error space_not_found = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.Error request_expired = 4;
      commonmodels.Error request_not_found = 5;
      commonmodels.Error request_cannot_be_approved = 6;
    }
  }
};
