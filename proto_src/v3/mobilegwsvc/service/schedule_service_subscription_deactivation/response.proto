syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.schedule_service_subscription_deactivation;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.schedule_service_subscription_deactivation";
option java_multiple_files = true;
option swift_prefix = "";

message ScheduleServiceSubscriptionDeactivationResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {}

  message Failure {
    oneof error {
      commonmodels.Error illegal_argument = 1;
      commonmodels.Error subscription_not_found = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.Error illegal_state = 4;
    }
  }
}
