syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_day_alarm_zone_event_config;


option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_day_alarm_zone_event_config";
option java_multiple_files = true;
option swift_prefix = "";

message UpdateDayAlarmZoneEventConfigRequest {
  string hub_hex_id = 1;

  DayAlarmZoneEventConfig event_config = 10;

  enum DayAlarmZoneEventConfig {
    DAY_ALARM_ZONE_EVENT_CONFIG_UNSPECIFIED = 0;
    DAY_ALARM_ZONE_EVENT_CONFIG_CMS_OFF = 1; // default = 1;
    DAY_ALARM_ZONE_EVENT_CONFIG_CMS_ON = 2;
  }
}
