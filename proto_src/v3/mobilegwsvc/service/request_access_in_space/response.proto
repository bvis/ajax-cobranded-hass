syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.request_access_in_space;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.request_access_in_space";
option java_multiple_files = true;
option swift_prefix = "";

message RequestAccessInSpaceResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {}

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error privacy_manager_not_found = 3;
    }
  }
}
