syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.apply_company_template_v2;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.apply_company_template_v2";
option java_multiple_files = true;
option swift_prefix = "";

message ApplyCompanyTemplateV2Response {

  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error permission_denied = 1;
      commonmodels.Error illegal_argument = 2;
      commonmodels.Error video_edge_not_found = 3;
      commonmodels.Error space_not_found = 4;
      commonmodels.Error space_armed = 5;
    }
  }
}
