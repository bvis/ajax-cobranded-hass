syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_video_edge_local_user;

import "systems/ajax/logging/proto/log_marker.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/localuser/local_user_permissions.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_video_edge_local_user";
option java_multiple_files = true;
option swift_prefix = "";

message UpdateVideoEdgeLocalUserRequest {
  // [required]
  string space_id = 1 [(log_marker) = LOG_MARKER_SPACE_ID];

  // [required]
  string video_edge_id = 2 [(log_marker) = LOG_MARKER_VIDEO_EDGE_ID];

  // [required]
  string name = 3;

  // [required]
  string new_name = 4;

  // [required]
  commonmodels.video.videoedge.localuser.LocalUserPermissions permissions = 5;
}
