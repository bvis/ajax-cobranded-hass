syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.hub_command_fire_zone_test;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
option java_multiple_files = true;
option swift_prefix = "";

message HubCommandFireZoneTestResponse {
  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error command_not_performed = 1; // 16_03
      commonmodels.Error permission_denied = 2; // 0635 (16_05)
      commonmodels.HubWrongStateError hub_wrong_state = 3; // 16_11
      commonmodels.Error hub_offline = 4; // 16_07
      commonmodels.Error unknown_command = 5; // 0636 (16_06)
      commonmodels.Error hub_error = 6; // 16_10
      commonmodels.HubBusyError hub_busy = 7; // 16_0F
    }
  }
}
