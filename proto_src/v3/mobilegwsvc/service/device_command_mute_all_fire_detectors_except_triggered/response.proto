syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.device_command_mute_all_fire_detectors_except_triggered;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
option java_multiple_files = true;
option swift_prefix = "";

message DeviceCommandMuteAllFireDetectorsExceptTriggeredResponse {
  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error unknown_command = 1; // 0636 (16_06)
      commonmodels.Error command_not_performed = 2; // 16_03
      commonmodels.HubWrongStateError hub_wrong_state = 4; // 16_11
      commonmodels.Error permission_denied = 5; // 0635 (16_05)
      commonmodels.Error hub_offline = 6; // 16_07
      commonmodels.Error delivered_was_already_performed = 7; // 16_09
      commonmodels.HubBusyError hub_busy = 8; // 0F
    }
  }
}
