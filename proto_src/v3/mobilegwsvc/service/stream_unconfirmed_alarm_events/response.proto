syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_unconfirmed_alarm_events;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/notification.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_unconfirmed_alarm_events";
option java_multiple_files = true;
option swift_prefix = "";

message StreamUnconfirmedAlarmEventsResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    oneof entity {
      Notifications snapshot = 1;
      Notifications created = 2;
      Notifications updated = 3;
    }
  }

  message Notifications {
    repeated systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.Notification notifications = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error not_found = 1;
      commonmodels.Error illegal_argument = 2;
      commonmodels.Error request_timeout = 3;
    }
  }
}
