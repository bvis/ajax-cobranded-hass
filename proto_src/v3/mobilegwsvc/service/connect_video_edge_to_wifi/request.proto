syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.connect_video_edge_to_wifi;

import "systems/ajax/logging/proto/log_marker.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/network/network_wifi_credentials.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.connect_video_edge_to_wifi";
option java_multiple_files = true;
option swift_prefix = "";

message ConnectVideoEdgeToWifiRequest {

  string space_id = 1 [(log_marker) = LOG_MARKER_SPACE_ID];

  string video_edge_id = 2 [(log_marker) = LOG_MARKER_VIDEO_EDGE_ID];

  string network_interface_id = 3;

  commonmodels.video.videoedge.netwotk.NetworkWifiCredentials credentials = 4;
}
