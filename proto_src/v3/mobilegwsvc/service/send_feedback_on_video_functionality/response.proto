syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.send_feedback_on_video_functionality;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.send_feedback_on_video_functionality";
option java_multiple_files = true;
option swift_prefix = "";

message SendFeedbackOnVideoFunctionalityResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {}

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error channel_not_found = 2;
      commonmodels.Error video_edge_not_found = 3;
      commonmodels.Error permission_denied = 4;
      commonmodels.Error space_not_found = 5;
    }
  }
};
