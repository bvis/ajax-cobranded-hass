syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_cloud_archive_metadata_fragments_content;

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_cloud_archive_metadata_fragments_content";
option java_multiple_files = true;
option swift_prefix = "";

message StreamCloudArchiveMetadataFragmentsContentRequest {

  oneof type {
    Init init = 1;
    Get get = 2;
  }

  message Init {
    // [required]
    string space_id = 1;

    // [required]
    string video_edge_id = 2;

    // [required]
    string channel_id = 3;

    // see available metadata types https://github.com/ajax-systems/video-proto/blob/master/v1/metadata/metadata.proto
    // [required]
    string metadata_type = 4;
  }

  message Get {
    // [optional]
    string tag = 1;

    // [required]
    repeated Entry entries = 2;

    message Entry {
      oneof type {
        uint64 fragment_id = 1;
      }
    }
  }
}
