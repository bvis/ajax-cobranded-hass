syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_detection_zone_test;

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_detection_zone_test";
option java_multiple_files = true;
option swift_prefix = "";

message StreamDetectionZoneTestRequest {

  oneof target {
    HubDetectionZoneTest hub_detection_zone_test = 1;
    DeviceDetectionZoneTest device_detection_zone_test = 2;
  }

  message HubDetectionZoneTest {
    string hub_id = 1;
  }

  message DeviceDetectionZoneTest {
    string hub_id = 1;
    string device_id = 2;
  }
}
