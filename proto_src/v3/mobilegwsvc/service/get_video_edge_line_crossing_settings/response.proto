syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_edge_line_crossing_settings;

import "systems/ajax/api/mobile/v2/common/video/types.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/channel/detection/line_crossing_direction.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_edge_line_crossing_settings";
option java_multiple_files = true;
option swift_prefix = "";

message GetVideoEdgeLineCrossingSettingsResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated Rule rules = 1;

    repeated mobile.v2.common.video.ObjectClass enabled_object_classes = 2;

    message Rule {
      string rule_id = 1;

      string name = 2;

      bool enabled = 3;

      repeated mobile.v2.common.video.Point2f points = 4;

      commonmodels.video.videoedge.channel.detection.LineCrossingDirection direction = 5;

      repeated mobile.v2.common.video.ObjectClass object_classes = 6;
    }
  }

  message Failure {

    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error space_not_found = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.Error video_edge_not_found = 4;
      commonmodels.Error channel_not_found = 5;
      commonmodels.Error line_crossing_settings_not_found = 6;
    }
  }
};
