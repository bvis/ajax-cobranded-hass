syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_space_members_with_enabled_group_permissions;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_space_members_with_enabled_group_permissions";
option java_multiple_files = true;
option swift_prefix = "";

message FindAllSpaceMembersWithEnabledGroupPermissionsResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated string space_member_ids = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
    }
  }
}
