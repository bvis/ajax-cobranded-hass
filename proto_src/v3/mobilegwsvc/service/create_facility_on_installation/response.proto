syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.create_facility_on_installation;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "v1/facility/facility.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.create_facility_on_installation";
option java_multiple_files = true;
option swift_prefix = "";

message CreateFacilityOnInstallationResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    systems.ajax.mobilegw.grpc.v1.facility.Facility facility = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error registration_number_not_unique = 2;
      mobile.v2.common.response.AddDeviceError add_device_failed = 3;
      commonmodels.Error empty_spaces_limit_exceeded = 4;
    }
  }
};
