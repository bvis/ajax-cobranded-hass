syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_edge_channel_monitoring_settings;

import "systems/ajax/logging/proto/log_marker.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_edge_channel_monitoring_settings";
option java_multiple_files = true;
option swift_prefix = "";

message GetVideoEdgeChannelMonitoringSettingsRequest {
