syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.delete_device_from_hub;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.delete_device_from_hub";
option java_multiple_files = true;
option swift_prefix = "";

message DeleteDeviceFromHubResponse {

  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    reserved 1, 6; // hub_not_found, device_not_found

    oneof error {
      commonmodels.HubWrongStateError hub_wrong_state = 2;
      commonmodels.Error bad_request = 3;
      commonmodels.Error permission_denied = 4;
      commonmodels.HubBusyError hub_busy = 5;
      commonmodels.Error hub_offline = 7;
      commonmodels.Error command_not_performed = 8;
    }
  }
}
