syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.start_hub_module_firmware_update;

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.start_hub_module_firmware_update";
option java_multiple_files = true;
option swift_prefix = "";

message StartHubModuleFirmwareUpdateRequest {
  string hub_id = 1;
  HubModule hub_module = 2;

  enum HubModule {
      HUB_MODULE_UNSPECIFIED = 0;
      HUB_MODULE_WIFI = 1;
  }
}
