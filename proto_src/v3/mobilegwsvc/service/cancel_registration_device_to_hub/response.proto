syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.cancel_registration_device_to_hub;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.cancel_registration_device_to_hub";
option java_multiple_files = true;
option swift_prefix = "";

message CancelRegistrationDeviceToHubResponse {

  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.HubWrongStateError hub_wrong_state = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.HubBusyError hub_busy = 4;
      commonmodels.Error hub_offline = 5;
    }
  }
}
