syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_cloud_archive_record_settings;

import "systems/ajax/api/mobile/v2/common/video/videoedge/archive/archive.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/video/duration_option.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_video_cloud_archive_record_settings";
option java_multiple_files = true;
option swift_prefix = "";

message GetVideoCloudArchiveRecordSettingsResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    mobile.v2.common.video.videoedge.archive.RecordMode record_mode = 1;

    mobile.v2.common.video.videoedge.archive.RecordPolicy record_policy = 2;

    // [optional] This will be always set while cloud archive is activated,
    // but according to VMS contract this may be empty
    commonmodels.video.DurationOption recording_duration = 3;

    // [optional] This will be always set while cloud archive is activated,
    // but according to VMS contract this may be empty
    commonmodels.video.DurationOption cooldown_interval = 4;

    repeated mobile.v2.common.video.videoedge.archive.RecordMode allowed_record_modes = 5;

    repeated commonmodels.video.DurationOption allowed_recording_durations = 6;

    repeated commonmodels.video.DurationOption allowed_cooldown_intervals = 7;

    // Indicates that all detectors for this channel are disabled,
    // meaning that selected recording preferences might not work properly
    bool detectors_disabled = 8;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_not_found = 3;
      commonmodels.Error video_edge_not_found = 4;
      commonmodels.Error channel_not_found = 5;
      commonmodels.Error cloud_archive_not_found = 6;
    }
  }
}
