syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_services_available_for_switch;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/accounting/service.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_services_available_for_switch";
option java_multiple_files = true;
option swift_prefix = "";

message GetServicesAvailableForSwitchResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    commonmodels.accounting.Service active_service = 1;
    repeated commonmodels.accounting.Service available_services = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error illegal_argument = 1;
      commonmodels.Error available_service_not_found = 2;
      commonmodels.Error subscription_not_found = 3;
    }
  }
}
