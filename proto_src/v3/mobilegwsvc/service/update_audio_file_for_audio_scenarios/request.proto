syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_audio_file_for_audio_scenarios;

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_audio_file_for_audio_scenarios";
option java_multiple_files = true;
option swift_prefix = "";

message UpdateAudioFileForAudioScenariosRequest {
