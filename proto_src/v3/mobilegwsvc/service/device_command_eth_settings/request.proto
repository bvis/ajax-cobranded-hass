syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.device_command_eth_settings;

import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/object_type.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.device_command_eth_settings";
option java_multiple_files = true;
option swift_prefix = "";

message DeviceCommandEthernetSettingsRequest {
  string hub_id = 1;
  string device_id = 2;
  ecosystem.v2.hubsvc.commonmodels.ObjectType device_type = 3;
  bool dhcp = 4;
  string ip = 5;
  string mask = 6;
  string gate = 7;
  string dns = 8;
}
