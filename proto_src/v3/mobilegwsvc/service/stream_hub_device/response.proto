syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_hub_device;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/hub_device.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.stream_hub_device";
option java_multiple_files = true;
option swift_prefix = "";

message StreamHubDeviceResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    oneof success {
      Snapshot snapshot = 1;
    }

    message Snapshot {
      ecosystem.v2.hubsvc.commonmodels.device.HubDevice hub_device = 1;
    }
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error device_not_found = 2;
    }
  }
}
