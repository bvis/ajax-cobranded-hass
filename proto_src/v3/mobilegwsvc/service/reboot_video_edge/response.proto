syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.reboot_video_edge;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.reboot_video_edge";
option java_multiple_files = true;
option swift_prefix = "";

message RebootVideoEdgeResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success { }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error space_not_found = 2;
      commonmodels.Error permission_denied = 3;
      commonmodels.Error video_edge_not_found = 4;
      commonmodels.Error space_armed = 5;
      commonmodels.Error video_edge_is_offline = 6;
    }
  }
}
