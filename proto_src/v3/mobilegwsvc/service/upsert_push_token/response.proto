syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.upsert_push_token;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "";

message UpsertPushTokenResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {}

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
    }
  }
}
