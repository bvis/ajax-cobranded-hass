syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.activate_services;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/accounting/enriched_target_info.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.activate_services";
option java_multiple_files = true;
option swift_prefix = "";

message ActivateServicesResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    string subscription_id = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error service_not_found = 2;
      commonmodels.Error reseller_not_found = 3;
      commonmodels.Error dealer_not_found = 4;
      commonmodels.Error linkage_not_active = 5;
      commonmodels.Error linkage_suspended = 6;
      commonmodels.Error target_suspended = 7;
      commonmodels.Error no_price_in_currency = 8;
      commonmodels.Error illegal_state = 9;
      AlreadyActiveOnTargetsError already_active_on_targets = 10;
    }

    message AlreadyActiveOnTargetsError {
      repeated commonmodels.accounting.EnrichedTargetInfo feature_target_infos = 1;
    }
  }
}
