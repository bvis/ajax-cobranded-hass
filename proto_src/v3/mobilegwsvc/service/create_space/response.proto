syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.create_space;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_lite.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.create_space";
option java_multiple_files = true;
option swift_prefix = "";

message CreateSpaceResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    mobile.v2.common.space.LiteSpace lite_space = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      mobile.v2.common.response.AddDeviceError add_device_failed = 2;
      commonmodels.Error empty_spaces_limit_exceeded = 3;
    }
  }
};
