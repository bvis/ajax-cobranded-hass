syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_members_with_permissions_for_device;

import "v3/mobilegwsvc/commonmodels/space/device/smart_lock_id.proto";
import "v3/mobilegwsvc/commonmodels/space/device/video_channel_id.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_members_with_permissions_for_device";
option java_multiple_files = true;
option swift_prefix = "";

message FindAllMembersWithPermissionsForDeviceRequest {
  string space_id = 1;

  oneof device_id {
    commonmodels.space.device.SmartLockId smart_lock_id = 2;

    commonmodels.space.device.VideoChannelId video_channel_id = 3;
  }
}
