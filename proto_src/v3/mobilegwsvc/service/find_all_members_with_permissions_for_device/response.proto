syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_members_with_permissions_for_device;

import "systems/ajax/api/mobile/v2/common/space/member/standalone_device_permissions.proto";
import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_members_with_permissions_for_device";
option java_multiple_files = true;
option swift_prefix = "";

message FindAllMembersWithPermissionsForDeviceResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated SpaceMemberDevicePermissions space_member_device_permissions = 1;

    message SpaceMemberDevicePermissions {
      string space_member_id = 1;

      mobile.v2.common.space.member.StandaloneDevicePermissions device_permissions = 2;
    }
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
    }
  }
}
