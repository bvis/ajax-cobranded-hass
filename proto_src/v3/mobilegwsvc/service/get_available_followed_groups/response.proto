syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_available_followed_groups;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/security/group/group.proto";
import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.get_available_followed_groups";
option java_multiple_files = true;
option swift_prefix = "";

message GetAvailableFollowedGroupsResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated mobile.v2.common.space.security.group.Group groups = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_armed = 3;
      mobile.v2.common.response.SpaceLockedError space_locked = 4;
    }
  }
}
