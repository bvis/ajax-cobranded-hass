syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_zombie_channels_on_video_edge;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.find_all_zombie_channels_on_video_edge";
option java_multiple_files = true;
option swift_prefix = "";

message FindAllZombieChannelsOnVideoEdgeResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {

    repeated ZombieChannel channels = 1;

    message ZombieChannel {
      string id = 1;
      optional string name = 2;
    }
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_not_found = 3;
      commonmodels.Error video_edge_not_found = 4;
    }
  }
}
