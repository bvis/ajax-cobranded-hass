syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_space_address;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.update_space_address";
option java_multiple_files = true;
option swift_prefix = "";

message UpdateAddressResponse {
  oneof response {
    commonmodels.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_not_found = 3;
      commonmodels.Error space_armed = 4;
      mobile.v2.common.response.SpaceLockedError space_locked = 5;
    }
  }
}
