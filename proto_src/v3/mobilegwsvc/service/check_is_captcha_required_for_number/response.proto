syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.check_is_captcha_required_for_number;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.user.service.check_is_captcha_required_for_number";
option java_multiple_files = true;
option swift_prefix = "";

message CheckIsCaptchaRequiredForNumberResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    bool need_captcha = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
    }
  }
}
