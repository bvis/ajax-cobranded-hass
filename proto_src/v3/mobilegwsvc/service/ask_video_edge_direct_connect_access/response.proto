syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.ask_video_edge_direct_connect_access;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.user.service.ask_video_edge_direct_connect_access";
option java_multiple_files = true;
option swift_prefix = "";

message AskVideoEdgeDirectConnectAccessResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    bytes raw_key = 1;

    bytes encrypted_key = 2;

    bytes encrypted_key_signature = 3;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_not_found = 3;
      commonmodels.Error space_armed = 4;
      commonmodels.Error certificate_not_found = 5;
    }
  }
}
