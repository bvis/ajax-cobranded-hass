syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_notification_settings;

import "v3/mobilegwsvc/commonmodels/response/response.proto";
import "v3/mobilegwsvc/commonmodels/video/videoedge/channel/notification/video_notification_settings.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.service.set_video_notification_settings";
option java_multiple_files = true;
option swift_prefix = "";

message SetVideoNotificationSettingsResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    commonmodels.video.videoedge.channel.notification.VideoNotificationSettings video_notification_settings = 1;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
      commonmodels.Error permission_denied = 2;
      commonmodels.Error space_armed = 3;
      commonmodels.Error space_not_found = 4;
      commonmodels.Error video_edge_not_found = 5;
      commonmodels.Error channel_not_found = 6;
      commonmodels.Error unimplemented_video_edge_command = 7;
      commonmodels.Error video_edge_is_offline = 8;
    }
  }
}
