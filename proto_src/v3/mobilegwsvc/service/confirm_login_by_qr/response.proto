syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.service.confirm_login_by_qr;

import "v3/mobilegwsvc/commonmodels/response/response.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.user.service.confirm_login_by_qr";
option java_multiple_files = true;
option swift_prefix = "";

message ConfirmLoginByQrResponse {
  oneof response {
    commonmodels.Success success = 1;
    Failure error = 2;
  }

  message Failure {
    oneof error {
      commonmodels.Error bad_request = 1;
    }
  }
}
