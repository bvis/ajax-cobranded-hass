syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.commonmodels.account;

import "v3/mobilegwsvc/commonmodels/type/user_role.proto";
import "systems/ajax/logging/proto/formatting_options.proto";

option swift_prefix = "";
option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.commonmodels.account";
option java_multiple_files = true;

message LiteAccount {
  string user_hex_id = 1;
  type.UserRole user_role = 2;
  string first_name = 3 [(hash_value) = true];
  optional string last_name = 4 [(hash_value) = true];
  string locale = 5;
  uint32 end_user_agreement_version = 6;
  uint32 privacy_policy_version = 7;
  string email = 8 [(hash_value) = true];
  optional uint32 privacy_notice_version = 9;
}
