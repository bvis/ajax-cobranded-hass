syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.commonmodels.video.videoedge.netwotk;

import "google/protobuf/empty.proto";
import "systems/ajax/logging/proto/formatting_options.proto";

option swift_prefix = "";
option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.commonmodels.video.videoedge.netwotk";
option java_multiple_files = true;

message NetworkWifiCredentials {
  oneof kind_union {
    google.protobuf.Empty none = 1;
    PSK psk = 2;
  }

  message PSK {
    // [optional]
    string password = 1 [(hash_value) = true];
  }
}
