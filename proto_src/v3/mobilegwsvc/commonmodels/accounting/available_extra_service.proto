syntax = "proto3";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.commonmodels.accounting;

import "systems/ajax/api/mobile/v2/common/accounting/accounting_company.proto";
import "v3/mobilegwsvc/commonmodels/accounting/enriched_target_info.proto";
import "v3/mobilegwsvc/commonmodels/accounting/service.proto";
import "v3/mobilegwsvc/commonmodels/accounting/reseller.proto";

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.commonmodels.accounting";
option java_multiple_files = true;
option swift_prefix = "";

message AvailableExtraService {
  commonmodels.accounting.Service service = 1;
  repeated systems.ajax.api.mobile.v2.common.accounting.AccountingCompany resellers = 2 [deprecated = true];
  repeated commonmodels.accounting.EnrichedTargetInfo feature_target_infos = 3;
  repeated commonmodels.accounting.Reseller reseller_infos = 4;
}
