syntax = "proto3";

import "v3/mobilegwsvc/commonmodels/space/integration/space_integration_type.proto";
import "systems/ajax/api/mobile/v2/common/space/space_profile.proto";
import "google/protobuf/timestamp.proto";
import "systems/ajax/logging/proto/formatting_options.proto";

package systems.ajax.api.ecosystem.v3.mobilegwsvc.commonmodels.space.integration.credentials;

option java_package = "systems.ajax.api.ecosystem.v3.mobilegwsvc.commonmodels.space.integration.credentials";
option java_multiple_files = true;
option swift_prefix = "";

message CredentialsInfo {
  string id = 1;
  SpaceIntegrationType type = 2;
  google.protobuf.Timestamp created_at = 3;
  repeated Relation relations = 4;
  ExternalUser external_user = 5;

  message Relation {
    oneof kind {
      StandaloneDeviceRelation standalone_device_relation = 1;
      SpaceRelation space_relation = 2;
    }
  }

  message StandaloneDeviceRelation {
    string space_id = 1;
    oneof device_id {
      string smart_lock_id = 2;
    }
    optional string device_name = 100;
    optional string space_name = 101;
    optional string room_id = 102;
    optional string room_name = 103;
  }

  message SpaceRelation {
    string space_id = 1;
    optional string space_name = 2;
    optional mobile.v2.common.space.SpaceProfile profile = 3;
  }

  message ExternalUser {
    string id = 1;
    string email = 2 [(disable_logging) = true];
    optional string image_url = 3 [(disable_logging) = true];
  }
}
