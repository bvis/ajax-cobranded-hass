syntax = "proto3";

package systems.ajax.mobilegw.grpc.v1.common;

option swift_prefix = "";
option java_generic_services = true;
option java_package = "systems.ajax.mobilegw.grpc.v1.common";

/*
 * Compact image urls structure.
 * Contains base_path as a required prefix to build URL and suffix values
 * for different image size.
 *
 * Example:
 *   small_image_url = image_urls.base_path + image_urls.small
 */
message ImageUrls {
  string small = 1000;
  string medium = 1010;
  string big = 1020;

  string base_path = 2000;
}
