syntax = "proto3";

package systems.ajax.mobilegw.grpc.v1.responsible_person;

option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "google/protobuf/empty.proto";

import "v1/responsible_person/stream-responsible-persons-request.proto";
import "v1/responsible_person/stream-responsible-persons-response.proto";
import "v1/responsible_person/create-responsible-person-request.proto";
import "v1/responsible_person/create-responsible-person-response.proto";
import "v1/responsible_person/delete-responsible-person-request.proto";
import "v1/responsible_person/update-responsible-person-request.proto";
import "v1/responsible_person/update-responsible-person-response.proto";

service ResponsiblePersonService {
  /*
* Possible error statuses and corresponding error templates
*
* TIMEOUT - systems.ajax.mobilegw.error.timeout
* UNAUTHENTICATED = "systems.ajax.mobilegw.error.unauthenticated"
* INTERNAL_SERVICE_ERROR = "systems.ajax.mobilegw.error.internalServiceError"
* NOT_FOUND = "systems.ajax.mobilegw.error.notFound"
* INVALID_ARGUMENT = "systems.ajax.mobilegw.constraints.*"
*/
  rpc streamResponsiblePersons (StreamResponsiblePersonsRequest) returns (stream StreamResponsiblePersonsResponse);
  /*
 * Possible error statuses and corresponding error templates
 * INVALID_ARGUMENT = "systems.ajax.mobilegw.constraints.*"
 */
  rpc createResponsiblePerson (CreateResponsiblePersonRequest) returns (CreateResponsiblePersonResponse);
  /*
 * Possible error statuses and corresponding error templates
 * INVALID_ARGUMENT = "systems.ajax.mobilegw.constraints.*"
 */
  rpc updateResponsiblePerson (UpdateResponsiblePersonRequest) returns (UpdateResponsiblePersonResponse);
  /*
 * Possible error statuses and corresponding error templates
 * INVALID_ARGUMENT = "systems.ajax.mobilegw.constraints.*"
 */
  rpc deleteResponsiblePerson (DeleteResponsiblePersonRequest) returns (google.protobuf.Empty);
}
