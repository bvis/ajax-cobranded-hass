syntax = "proto3";

package systems.ajax.mobilegw.grpc.v1.responsible_person;

option java_package = "systems.ajax.mobilegw.grpc.v1.responsible_person";
option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "v1/common/email-address.proto";
import "v1/common/phone-number.proto";

message ResponsiblePerson {
  string id = 1;
  string facility_id = 2;
  string first_name = 3;
  string last_name = 4;
  repeated common.PhoneNumber phone_numbers = 5;
  repeated common.EmailAddress email_addresses = 6;
}
