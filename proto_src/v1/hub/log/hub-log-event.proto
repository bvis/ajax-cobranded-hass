syntax = "proto3";

package systems.ajax.mobilegw.grpc.v1.hub.log;

option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "google/protobuf/timestamp.proto";

message HubLogEvent {
  string id = 1;

  oneof event {
    VideoScenarioTriggeredEvent video_scenario_triggered = 101;
  }
}

message VideoScenarioTriggeredEvent {
  string scenario_name = 1;

  repeated ChannelGif channel_gifs = 2;

  google.protobuf.Timestamp triggered_time = 3;

  message ChannelGif {
    string channel_guid = 1;

    string channel_name = 2;

    string room_name = 3;

    repeated string frames = 4;

    string video_edge_id = 5;
  }
}
