syntax = "proto3";

package systems.ajax.mobilegw.grpc.v1.hub.log;

option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "v1/hub/log/get-log-event-request.proto";

service HubLogEventService {
  rpc getLogEvent(GetLogEventRequest) returns (GetLogEventResponse);
}
