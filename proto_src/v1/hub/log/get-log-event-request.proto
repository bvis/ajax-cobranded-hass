syntax = "proto3";

package systems.ajax.mobilegw.grpc.v1.hub.log;

option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "v1/hub/log/hub-log-event.proto";

message GetLogEventRequest {
  string hub_id = 1;

  int64 time = 2;
};

message GetLogEventResponse {
  HubLogEvent event = 1;
};
