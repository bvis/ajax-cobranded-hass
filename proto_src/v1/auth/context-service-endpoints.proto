syntax = "proto3";

package systems.ajax.mobilegw.grpc.v1.auth;

option swift_prefix = "";
option java_package = "systems.ajax.mobilegw.grpc.v1.auth";
option java_generic_services = true;

import "google/protobuf/empty.proto";

import "v1/auth/login-response.proto";
import "v1/auth/switch-context-request.proto";

/*
 * Service that provides methods for mobile users switch context between companies and personal account.
 */
service ContextService {
  /*
* Possible error statuses and corresponding error templates
*
* TIMEOUT - systems.ajax.mobilegw.error.timeout
* UNAUTHENTICATED = "systems.ajax.mobilegw.error.unauthenticated"
* INTERNAL_SERVICE_ERROR = "systems.ajax.mobilegw.error.internalServiceError"
* NOT_FOUND= "systems.ajax.mobilegw.error.notFound.user"
*/
  rpc switchCompanyContext (SwitchContextRequest) returns (LoginResponse);
  /*
* Possible error statuses and corresponding error templates
*
* TIMEOUT - systems.ajax.mobilegw.error.timeout
* UNAUTHENTICATED = "systems.ajax.mobilegw.error.unauthenticated"
* INTERNAL_SERVICE_ERROR = "systems.ajax.mobilegw.error.internalServiceError"
* NOT_FOUND= "systems.ajax.mobilegw.error.notFound.user"
*/
  rpc switchContextToPersonalAccount (google.protobuf.Empty) returns (LoginResponse);
  /*
* Possible error statuses and corresponding error templates
*
* TIMEOUT - systems.ajax.mobilegw.error.timeout
* UNAUTHENTICATED = "systems.ajax.mobilegw.error.unauthenticated"
* INTERNAL_SERVICE_ERROR = "systems.ajax.mobilegw.error.internalServiceError"
* NOT_FOUND= "systems.ajax.mobilegw.error.notFound.user"
*/
  rpc getCurrentContext(google.protobuf.Empty) returns (LoginResponse);
}
