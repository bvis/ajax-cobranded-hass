syntax = "proto3";

package systems.ajax.mobilegw.grpc.v1.media;

option swift_prefix = "";
option java_package = "systems.ajax.mobilegw.grpc.v1.media";
option java_multiple_files = true;

import "v1/common/image.proto";

message Media {
  Info info = 1;
  repeated common.Image images = 2;

  message Info {
    string id = 1;
    string facility_id = 2;
    string image_id = 3;
    string caption = 4;
    Category category = 5;

    enum Category {
      ROAD_MAP = 0;
      FLOOR_PLAN = 1;
    }
  }
}
