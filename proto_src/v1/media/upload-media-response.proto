syntax = "proto3";

package systems.ajax.mobilegw.grpc.v1.media;

option swift_prefix = "";
option java_package = "systems.ajax.mobilegw.grpc.v1.media";
option java_multiple_files = true;

import "v1/common/image.proto";
import "google/protobuf/timestamp.proto";

message UploadMediaResponse {
  string image_id = 1;
  repeated common.Image images = 2;
  google.protobuf.Timestamp expiration_time = 3;
}
