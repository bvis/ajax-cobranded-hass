syntax = "proto3";

package systems.ajax.mobilegw.grpc.v1.facility;

option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "google/protobuf/empty.proto";

import "v1/facility/facility-search-request.proto";
import "v1/facility/facility-search-response.proto";
import "v1/facility/facility-stream-request.proto";
import "v1/facility/facility-stream-response.proto";
import "v1/facility/facility-update-request.proto";
import "v1/facility/facility-update-response.proto";

import "v1/facility/facility-access-rights-request.proto";

import "v1/facility/facility-stream-notes-request.proto";
import "v1/facility/facility-stream-notes-response.proto";

service FacilityService {
  // facilities

  /*
* Possible error statuses and corresponding error templates
*
* TIMEOUT - systems.ajax.mobilegw.error.timeout
* UNAUTHENTICATED = "systems.ajax.mobilegw.error.unauthenticated"
* INTERNAL_SERVICE_ERROR = "systems.ajax.mobilegw.error.internalServiceError"
* NOT_FOUND = "systems.ajax.mobilegw.error.notFound"
* INVALID_ARGUMENT = "systems.ajax.mobilegw.constraints.*"
*/
  rpc searchFacilities (FacilitySearchRequest) returns (FacilitySearchResponse);
  /*
* Possible error statuses and corresponding error templates
*
* TIMEOUT - systems.ajax.mobilegw.error.timeout
* UNAUTHENTICATED = "systems.ajax.mobilegw.error.unauthenticated"
* INTERNAL_SERVICE_ERROR = "systems.ajax.mobilegw.error.internalServiceError"
* NOT_FOUND = "systems.ajax.mobilegw.error.notFound"
*/
  rpc streamFacility (FacilityStreamRequest) returns (stream FacilityStreamResponse);
  /*
* Possible error statuses and corresponding error templates
*
* TIMEOUT - systems.ajax.mobilegw.error.timeout
* UNAUTHENTICATED = "systems.ajax.mobilegw.error.unauthenticated"
* INTERNAL_SERVICE_ERROR = "systems.ajax.mobilegw.error.internalServiceError"
* NOT_FOUND = "systems.ajax.mobilegw.error.notFound"
* INVALID_ARGUMENT = "systems.ajax.mobilegw.constraints.*"
*/
  rpc updateFacilityWithNotes (FacilityUpdateRequest) returns (FacilityUpdateResponse);


  // access rights
  rpc requestFacilityAccessRights (FacilityAccessRightsRequest) returns (google.protobuf.Empty);

  // notes

  /*
* Possible error statuses and corresponding error templates
*
* TIMEOUT - systems.ajax.mobilegw.error.timeout
* UNAUTHENTICATED = "systems.ajax.mobilegw.error.unauthenticated"
* INTERNAL_SERVICE_ERROR = "systems.ajax.mobilegw.error.internalServiceError"
* NOT_FOUND = "systems.ajax.mobilegw.error.notFound"
*/
  rpc streamNotes (FacilityStreamNotesRequest) returns (stream FacilityStreamNotesResponse);
}
