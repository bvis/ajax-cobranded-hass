syntax = "proto3";

package systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.space.additional.data;

import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/device_label.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/hub_box_type.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/hub_color.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/hub_type.proto";

option java_package = "systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.space.additional.data";
option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

message HubInSpaceInfo {
  string id = 1;
  string name = 2;

  hub.HubType type = 3;
  hub.HubColor color = 4;
  hub.DeviceLabel device_label = 5;
  optional hub.HubBoxType box_type = 6;
}
