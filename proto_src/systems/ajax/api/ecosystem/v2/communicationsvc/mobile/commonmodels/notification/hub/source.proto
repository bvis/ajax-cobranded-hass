syntax = "proto3";

package systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.hub;

option java_package = "systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.hub";
option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/source_image_info.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/access_card_type.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/device_color.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/device_label.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/hub_box_type.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/source_type.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/wire_input_alarm_type.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/yavir_access_control_type.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/device_special_appearance_type.proto";
import "systems/ajax/logging/proto/formatting_options.proto";

message HubNotificationSource {
  HubNotificationSourceType type = 1;
  string id = 2;
  optional string name = 3 [(hash_value) = true];

  optional DeviceColor device_color = 4;
  optional DeviceLabel device_label = 5;
  optional HubUserType hub_user_type = 6;
  optional AccessCardType access_card_type = 7;
  optional YavirAccessControlType yavir_access_control_type = 8;
  optional HubBoxType box_type = 9;
  optional CustomAlarmType wire_input_alarm_type = 11;
  optional DeviceSpecialAppearanceType device_special_appearance_type = 12;

  optional SourceImageInfo image_info = 10;

  optional string room_hex_id = 21;
  optional string room_name = 22; // As for now, it may be a Group name sometimes

  enum HubUserType {
    USER_TYPE_UNSPECIFIED = 0;
    USER = 1;
    PRO = 2;
    COMPANY = 3;
  }
}
