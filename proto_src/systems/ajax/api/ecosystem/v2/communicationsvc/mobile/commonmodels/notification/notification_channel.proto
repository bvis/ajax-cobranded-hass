syntax = "proto3";

package systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification;

option java_generic_services = true;
option java_multiple_files = true;
option java_package = "systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification";
option swift_prefix = "";

enum NotificationChannel {
  NO_NOTIFICATION_CHANNEL_INFO = 0;
  PUSH = 1;
  SMS = 2;
  CALL = 3;
}

message NotificationChannels {
  repeated NotificationChannel channels = 1;
}
