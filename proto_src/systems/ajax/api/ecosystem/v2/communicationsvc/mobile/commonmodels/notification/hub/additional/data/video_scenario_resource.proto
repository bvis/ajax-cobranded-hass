syntax = "proto3";

package systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.hub.additional.data;

option java_package = "systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.hub.additional.data";
option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "google/protobuf/timestamp.proto";

message VideoScenarioResource {
  option deprecated = true;

  string scenario_name = 1;
  google.protobuf.Timestamp trigger_time = 3;

  repeated ChannelAlarmFrameMetadata channel_metadata = 4;

  message ChannelAlarmFrameMetadata {
    string channel_id = 1;
    string channel_name = 2;
    optional string room_name = 3;
    int32 frames_ready = 4;
  }
}
