syntax = "proto3";

package systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.video;

option java_package = "systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.video";
option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/source_image_info.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/video/device_color.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/video/source_type.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/video/video_edge_type.proto";
import "systems/ajax/logging/proto/formatting_options.proto";

message VideoNotificationSource {
  VideoNotificationSourceType type = 1;
  string id = 2;
  optional string name = 3 [(hash_value) = true];

  optional string room_hex_id = 4;
  optional string room_name = 5;

  optional DeviceColor device_color = 6;
  optional VideoEdgeType video_edge_type = 7;
  optional SourceImageInfo image_info = 10;
}
