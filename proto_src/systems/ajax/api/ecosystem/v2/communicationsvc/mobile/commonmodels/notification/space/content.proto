syntax = "proto3";

package systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.space;

option java_package = "systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.space";
option java_multiple_files = true;
option swift_prefix = "";

import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/space/source.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/event/space/qualifier.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/hub/source.proto";

message SpaceNotificationContent {
  event.space.SpaceEventQualifier qualifier = 1;

  oneof source {
    notification.space.SpaceNotificationSource space_source = 2;
    notification.hub.HubNotificationSource hub_source = 3;
  }
}
