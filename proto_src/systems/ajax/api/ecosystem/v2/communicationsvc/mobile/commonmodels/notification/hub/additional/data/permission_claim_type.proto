syntax = "proto3";

package systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.hub.additional.data;

option java_package = "systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.hub.additional.data";
option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "google/protobuf/duration.proto";

message PermissionsClaimType {
  oneof permissions_type {
    Permanent permanent = 1;
    Temporary temporary = 2;
    Rejected rejected = 3;
  }

  message Permanent { }
  message Rejected { }

  message Temporary {
    google.protobuf.Duration duration = 1;
  }
}
