syntax = "proto3";

package systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.space.additional.data;

option java_package = "systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.space.additional.data";
option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "google/protobuf/timestamp.proto";
import "systems/ajax/logging/proto/formatting_options.proto";

message SpaceLocationInfo {
  string latitude = 1 [(hash_value) = true];

  string longitude = 2 [(hash_value) = true];

  optional double acc = 3;

  optional double speed = 4;

  optional google.protobuf.Timestamp time = 5;
}
