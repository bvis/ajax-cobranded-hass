    company.additional.data.CompanyPermissionsClaimResponse company_permission_claim_response = 501;
    company.additional.data.InitiatorInfo initiator_info = 502;
  }

  oneof smart_lock_additional_data {
    smartlock.additional.data.Initiator initiator = 600;
