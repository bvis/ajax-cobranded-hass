syntax = "proto3";

package systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.video.additional.data.archive;

import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/video/types.proto";
import "systems/ajax/logging/proto/formatting_options.proto";

option java_package = "systems.ajax.api.ecosystem.v2.communicationsvc.mobile.commonmodels.notification.video.additional.data.archive";
option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

message DirectExportRequestedData {
  string initiator_member_id = 1;

  string initiator_name = 2 [(hash_value) = true];

  string channel_id = 3;

  string channel_name = 4;

  repeated commonmodels.video.TimestampRange export_ranges = 5;

  optional string timezone_id = 6;
}
