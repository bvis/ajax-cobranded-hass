syntax = "proto3";

package systems.ajax.api.ecosystem.v2.hubsvc.commonmodels.device.common;

import "systems/ajax/api/ecosystem/v2/commonmodels/device/common/security_standart.proto";

option swift_prefix = "";
option java_package = "systems.ajax.api.ecosystem.v2.hubsvc.commonmodels.device.common";
option java_multiple_files = true;

message CommonStandardCompliancePart {
  v2.commonmodels.device.common.SecurityStandard current_standard = 1;
  ComplianceInfo pd_compliance = 2;
  ComplianceInfo en_compliance = 3;
  ComplianceInfo sia_cp_compliance = 4;

  enum ComplianceInfo {
    COMPLIANCE_INFO_UNSPECIFIED = 0;
    COMPLIANCE_INFO_COMPLIANT = 1;
    COMPLIANCE_INFO_WARNING = 2;
  }
}
