    LIGHT_INDICATION_AREA_CORNER_BACKLIGHT = 1 [(proto.meta.enum_tag) = "LIGHT_INDICATION_AREA_CORNER_BACKLIGHT"];
    LIGHT_INDICATION_AREA_FULL_FRAME_BACKLIGHT = 2 [(proto.meta.enum_tag) = "LIGHT_INDICATION_AREA_FULL_FRAME_BACKLIGHT"];
  }
