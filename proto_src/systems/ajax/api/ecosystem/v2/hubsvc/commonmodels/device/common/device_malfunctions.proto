syntax = "proto3";

package systems.ajax.api.ecosystem.v2.hubsvc.commonmodels.device.common;

option swift_prefix = "";
option java_package = "systems.ajax.api.ecosystem.v2.hubsvc.commonmodels.device.common";
option java_multiple_files = true;

message DeviceMalfunctions {
  repeated Malfunction malfunctions = 1;

  enum Malfunction {
    MALFUNCTION_UNSPECIFIED = 0;
    MALFUNCTION_CABLE_BREAK_ISSUE = 1;
    MALFUNCTION_VOLTAGE_INSTABILITY = 2;
    MALFUNCTION_SIREN_VOLUME_TEST_REQUIRED = 3;
    MALFUNCTION_CO_SENSOR_MALFUNCTION = 4;
    MALFUNCTION_CO_SENSOR_LEVEL_EXCEEDED = 5;
    MALFUNCTION_SENSOR_CAL_ERROR_1 = 6;
    MALFUNCTION_MICROWAVE_SENSOR_CALIBRATION_ERROR = 7;
    MALFUNCTION_ACCELEROMETER_MALFUNCTION = 8;
    MALFUNCTION_BAD_INPUT_RESISTANCE = 9;
    MALFUNCTION_BAD_TEMPERATURE = 10;
    MALFUNCTION_END_OF_LIFE = 11;
    MALFUNCTION_HARDWARE_MALFUNCTION = 12;
    MALFUNCTION_BATTERY_HARDWARE_MALFUNCTION = 23;
    MALFUNCTION_MEMORY_MALFUNCTION = 24;
    MALFUNCTION_WATCHDOG_MALFUNCTION = 25;
    MALFUNCTION_BATTERY_LOAD_MALFUNCTION = 26;
    MALFUNCTION_MODEM_MALFUNCTION = 27;
    MALFUNCTION_WIFI_CONNECTION_FAIL = 28;
    MALFUNCTION_BATTERY_MALFUNCTION = 29;
    MALFUNCTION_BATTERY_CHARGE_ERROR = 30;
    MALFUNCTION_SOFTWARE_MALFUNCTION = 31;
    MALFUNCTION_FLASH_MALFUNCTION = 32;
    MALFUNCTION_MASKING_SENSOR_CALIBRATION_FAILED = 33;
    MALFUNCTION_MASKING_SENSOR_BROKEN = 34;
    MALFUNCTION_PIR_SENSOR_BROKEN = 35;
    MALFUNCTION_MICROWAVE_SENSOR_BROKEN = 36;
  }
}
