  common.DeviceBatteryWithoutCharging device_battery = 8;
  common.DeviceTemperature device_temperature = 9;
  common.DeviceTamperStatus device_tamper_status = 10[(proto.meta.field_tag) = "tampered"];
  common.CommonStandardCompliancePart common_standard_compliance_part = 11;
  common.GroupAssociation group_association = 12;
