option java_multiple_files = true;

message HomeSirenFibra {
  common.CommonFibraPart common_fibra_part = 1;
  common.CommonSirenPart common_siren_part = 2;
  common.AlarmVerification alarm_verification = 3;
  common.AlarmRestriction alarm_restriction = 4;
  common.PostAlarmIndication post_alarm_indication_props = 6;
