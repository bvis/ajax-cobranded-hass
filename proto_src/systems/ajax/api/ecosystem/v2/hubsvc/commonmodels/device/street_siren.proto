syntax = "proto3";

package systems.ajax.api.ecosystem.v2.hubsvc.commonmodels.device;

import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/alarm_restriction.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/alarm_verification.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/common_siren_part.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/common_standard_compliance_part.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/device_battery.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/device_tamper_status.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/device_temperature.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/common_jeweller_part.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/group_association.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/post_alarm_indication.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/external_power.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/gyroscope.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/radio_interference_detection_part.proto";
