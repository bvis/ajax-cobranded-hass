import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/meta/meta.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/common_wings_part.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/light_indication_area_part.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/common_sound_compliance_pattern_part.proto";
import "systems/ajax/api/ecosystem/v2/hubsvc/commonmodels/device/common/bracket_state.proto";

option swift_prefix = "";
option java_package = "systems.ajax.api.ecosystem.v2.hubsvc.commonmodels.device";
option java_multiple_files = true;

message StreetSiren {
  common.CommonJewellerPart common_jeweller_part = 1;
  common.CommonSirenPart common_siren_part = 2;
  common.AlarmVerification alarm_verification = 3;
  common.AlarmRestriction alarm_restriction = 4;
  common.PostAlarmIndication post_alarm_indication_props = 5;
  common.DeviceBatteryWithoutCharging device_battery = 6;
  common.DeviceTemperature device_temperature = 7;
  // Should be in common part but we already release it
  common.DeviceTamperStatus device_tamper_status = 8[(proto.meta.field_tag) = "tampered"];
  common.CommonStandardCompliancePart common_standard_compliance_part = 9;
  common.GroupAssociation group_association = 10;
  common.ExternalPower external_power = 11;
  common.Gyroscope gyroscope = 12;
  common.CommonWingsPart common_wings_part = 13;
}

message StreetSirenPlusG3 {
  common.CommonJewellerPart common_jeweller_part = 1;
  common.CommonSirenPart common_siren_part = 2;
  common.AlarmVerification alarm_verification_part = 3;
  common.AlarmRestriction alarm_restriction_part = 4;
  common.PostAlarmIndication post_alarm_indication_part = 5;
  common.DeviceBatteryWithoutCharging device_battery_without_charging_part = 6;
  common.DeviceTemperature device_temperature_part = 7;
  common.CommonSirenTamperPart common_siren_tamper_part = 8;
  common.CommonStandardCompliancePart common_standard_compliance_part = 9;
  common.GroupAssociation group_association_part = 10;
  common.ExternalPower external_power_part = 11;
  common.BracketStatePart bracket_state_part = 12;
  common.CommonWingsPart common_wings_part = 13;
  common.CommonSoundCompliancePatternPart common_sound_compliance_pattern_part = 14;
  common.RadioInterferenceDetectionPart radio_interference_detection_part = 15;
  common.LightIndicationAreaPart light_indication_area_part = 16;
  common.DeviceTamperStatus device_tamper_status = 17[(proto.meta.field_tag) = "tampered"];
}
