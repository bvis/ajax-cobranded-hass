syntax = "proto3";

package systems.ajax.api.mobile.v2.common.space.smartlock;

import "systems/ajax/api/mobile/v2/common/space/smartlock/smart_lock_event_settings.proto";

option java_multiple_files = true;
option swift_prefix = "";

message SmartLockSpaceSettings {
  string room_id = 1;
  SmartLockEventSettings event_settings = 2;
