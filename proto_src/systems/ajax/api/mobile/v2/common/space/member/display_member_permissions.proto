syntax = "proto3";

package systems.ajax.api.mobile.v2.common.space.member;

option java_multiple_files = true;
option swift_prefix = "";

message DisplayMemberPermissions {
  repeated DisplaySpaceMemberSpacePermission space_permissions = 1;
  repeated DisplaySpaceMemberHubPermission hub_permissions = 2;
  repeated DisplaySpaceMemberHubPermissionExtended hub_permissions_extended = 3;
  DisplaySpaceMemberDayAlarmPermission day_alarm_permission = 4;
}

enum DisplaySpaceMemberSpacePermission {
  DISPLAY_SPACE_MEMBER_SPACE_PERMISSION_UNSPECIFIED = 0;
  DISPLAY_SPACE_MEMBER_SPACE_PERMISSION_PRIVACY_SETTINGS_MANAGEMENT = 1;
  DISPLAY_SPACE_MEMBER_SPACE_PERMISSION_SECURITY_MODE_CHANGE = 2;
  DISPLAY_SPACE_MEMBER_SPACE_PERMISSION_PANIC = 3;
  DISPLAY_SPACE_MEMBER_SPACE_PERMISSION_NIGHT_MODE = 4;
  DISPLAY_SPACE_MEMBER_SPACE_PERMISSION_VIEW_DEVICES_AND_ROOMS = 5;
  DISPLAY_SPACE_MEMBER_SPACE_PERMISSION_VIEW_NOTIFICATIONS = 6;
  DISPLAY_SPACE_MEMBER_SPACE_PERMISSION_SYSTEM_SETTINGS = 7;
}

enum DisplaySpaceMemberDayAlarmPermission {
  DISPLAY_SPACE_MEMBER_DAY_ALARM_PERMISSION_UNSPECIFIED = 0;
  DISPLAY_SPACE_MEMBER_DAY_ALARM_PERMISSION_NONE = 1;
  DISPLAY_SPACE_MEMBER_DAY_ALARM_PERMISSION_TEMPORARY_BYPASS = 2;
  DISPLAY_SPACE_MEMBER_DAY_ALARM_PERMISSION_PERMANENT_BYPASS = 3;
}

enum DisplaySpaceMemberHubPermission {
  // Can be removed after space apps are released
  reserved 1, 3;
  DISPLAY_SPACE_MEMBER_HUB_PERMISSION_UNSPECIFIED = 0;
  DISPLAY_SPACE_MEMBER_HUB_PERMISSION_HOME_AUTOMATION_CONTROLS = 2;
  DISPLAY_SPACE_MEMBER_HUB_PERMISSION_CHIME_ACTIVATION = 4;
  DISPLAY_SPACE_MEMBER_HUB_PERMISSION_SECURITY_MANAGEMENT_VIA_BLUETOOTH = 5;
  DISPLAY_SPACE_MEMBER_HUB_PERMISSION_FIRE_ALARM_MUTING = 6;
  DISPLAY_SPACE_MEMBER_HUB_PERMISSION_CAMERA_WATCH = 7;
  DISPLAY_SPACE_MEMBER_HUB_PERMISSION_START_BUKHOOR = 8;
  // available only in case HUB_FEATURE_FW_UPDATE_PERMISSION_NOT_IN_SYSTEM_PERMISSIONS is present
  // i.e. when FW_UPDATE is not given in SYSTEM_SETTINGS permissions batch, but is given by separate toggle
  DISPLAY_SPACE_MEMBER_HUB_PERMISSION_FW_UPDATE = 9;
}

enum DisplaySpaceMemberHubPermissionExtended {
  DISPLAY_SPACE_MEMBER_HUB_PERMISSION_EXTENDED_UNSPECIFIED = 0;
  DISPLAY_SPACE_MEMBER_HUB_PERMISSION_EXTENDED_ACCESS_LEVEL_2 = 1;
}
