syntax = "proto3";

package systems.ajax.api.mobile.v2.common.space.device;

option java_package = "systems.ajax.api.mobile.v2.common.space.device";
option java_multiple_files = true;
option swift_prefix = "";

import "systems/ajax/api/mobile/v2/common/video/videoedge/about/about.proto";
import "systems/ajax/api/mobile/v2/common/accounting/service_state.proto";

message VideoEdge {
  string id = 1;

  string room_id = 2;

  int32 non_zombie_channels_count = 3;

  v2.common.video.videoedge.about.About.Type type = 4;

  repeated Channel channels = 5;

  v2.common.accounting.ServiceState service_state = 6;

  message Channel {
    string id = 1;
  }
};
