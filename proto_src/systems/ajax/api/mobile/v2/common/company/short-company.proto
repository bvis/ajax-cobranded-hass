syntax = "proto3";

package systems.ajax.api.mobile.v2.common.company;

option java_generic_services = true;
option java_package = "systems.ajax.api.mobile.v2.common.company";
option java_multiple_files = true;
option swift_prefix = "";

import "systems/ajax/api/mobile/v2/common/logo/logo.proto";

message ShortCompany {
