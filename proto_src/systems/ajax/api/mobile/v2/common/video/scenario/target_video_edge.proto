syntax = "proto3";

package systems.ajax.api.mobile.v2.common.video.scenario;

option java_multiple_files = true;
option swift_prefix = "";

message TargetVideoEdge {
  string video_edge_id = 1;

  repeated TargetChannel channels = 2;
}

message TargetChannel {
  string channel_id = 1;
}

enum MonitoringState {
  UNKNOWN = 0;
  ARMED = 1;
  ALWAYS = 2;
}
