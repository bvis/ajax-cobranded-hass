syntax = "proto3";

package systems.ajax.api.mobile.v2.common.video.privacy;

option java_multiple_files = true;
option swift_prefix = "";

import "systems/ajax/api/mobile/v2/common/video/privacy/channel_permission.proto";
import "google/protobuf/timestamp.proto";

message TemporaryChannelPermissions {
  repeated ChannelPermission permissions = 1;

  google.protobuf.Timestamp expire_at = 2;
}
