syntax = "proto3";

package systems.ajax.api.mobile.v2.notification;

option java_package = "systems.ajax.api.mobile.v2.notificationlog";
option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/origin_id.proto";
import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/media.proto";

message StreamNotificationMediaRequest {
  string notification_id = 1;
  ecosystem.v2.communicationsvc.mobile.commonmodels.notification.NotificationOriginId origin = 2;
}

message StreamNotificationMediaResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    ecosystem.v2.communicationsvc.mobile.commonmodels.notification.NotificationMedia media = 1;
  }

  message Failure {
    oneof errors {
      common.response.DefaultError illegal_argument = 1;
      common.response.DefaultError not_found = 2;
      common.response.DefaultError internal_error = 3;
      common.response.DefaultError media_expired = 4;
      common.response.DefaultError permission_denied = 5;
    }
  }
}
