syntax = "proto3";

package systems.ajax.api.mobile.v2.notification;

option java_package = "systems.ajax.api.mobile.v2.notificationlog";
option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/folder.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/origin_id.proto";

// https://ajaxsystems.atlassian.net/wiki/spaces/Tech/pages/4000613094/Notification+counters+API
message MarkNotificationsAsReadRequest {
  ecosystem.v2.communicationsvc.mobile.commonmodels.notification.NotificationOriginId origin = 1; // hub or space
  repeated Action mark_as_read = 2; // split action per each folder if read notifications in 'Total' folder

  message Action {
    oneof action {
      AllNotifications all = 1;
      AllNotificationsInFolder all_in_folder = 2;
      SomeNotificationsInFolder some_in_folder = 3;
    }

    message AllNotifications {}

    message AllNotificationsInFolder {
      // FOLDER_UNSPECIFIED is not allowed here
      ecosystem.v2.communicationsvc.mobile.commonmodels.notification.NotificationFolder folder = 1;
    }

    message SomeNotificationsInFolder {
      ecosystem.v2.communicationsvc.mobile.commonmodels.notification.NotificationFolder folder = 1;
      repeated string read_notifications_tokens = 2;
    }
  }
}

message MarkNotificationsAsReadResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {}

  message Failure {
    oneof errors {
      common.response.DefaultError illegal_argument = 1;
      common.response.DefaultError not_found = 2;
      common.response.DefaultError internal_error = 3;
    }
  }
}
