syntax = "proto3";

package systems.ajax.api.mobile.v2.notification;

option java_package = "systems.ajax.api.mobile.v2.notificationlog";
option java_multiple_files = true;
option java_generic_services = true;
option swift_prefix = "";

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/notification.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/folder.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/origin_id.proto";
import "systems/ajax/api/ecosystem/v2/communicationsvc/mobile/commonmodels/notification/unread_counters.proto";

message StreamNotificationLogRequest {
  ecosystem.v2.communicationsvc.mobile.commonmodels.notification.NotificationOriginId origin = 1;
}

message StreamNotificationLogResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  // One mandatory response with current counters, current available folders and folders info at the startup
  message Success {
    repeated Event events = 1;

    message Event {
      oneof event {
        ecosystem.v2.communicationsvc.mobile.commonmodels.notification.Notification notification_created = 1;
        ecosystem.v2.communicationsvc.mobile.commonmodels.notification.Notification notification_updated = 2;
        ecosystem.v2.communicationsvc.mobile.commonmodels.notification.UnreadNotificationCounters counters_updated = 10;
        AvailableFolders available_folders_updated = 20;
        LastAvailableNotifications last_available_notifications = 30;
      }
    }

    message AvailableFolders {
      repeated ecosystem.v2.communicationsvc.mobile.commonmodels.notification.NotificationFolder available_folders = 1;
    }

    message LastAvailableNotifications {
      repeated LastAvailableNotification infos = 1;
      optional string last_notification_token = 2; // per total

      message LastAvailableNotification {
        ecosystem.v2.communicationsvc.mobile.commonmodels.notification.NotificationFolder folder = 1;
        optional string last_notification_token = 2;
      }
    }
  }

  message Failure {
    oneof errors {
      common.response.DefaultError illegal_argument = 1;
      common.response.DefaultError not_found = 2;
      common.response.DefaultError internal_error = 3;
    }
  }
}
