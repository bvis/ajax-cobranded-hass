syntax = "proto3";

package systems.ajax.api.mobile.v2.space.company.monitoring;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/company/space_monitoring_company.proto";

option java_multiple_files = true;
option swift_prefix = "Space";

message SearchMonitoringCompaniesRequest {
  string email = 1;
  string space_id = 2;
};

message SearchMonitoringCompaniesResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated common.space.company.SpaceMonitoringCompany companies = 1;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
    }
  }
};
