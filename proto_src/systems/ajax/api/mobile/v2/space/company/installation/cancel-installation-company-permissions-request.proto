syntax = "proto3";

package systems.ajax.api.mobile.v2.space.company.installation;

import "systems/ajax/api/mobile/v2/common/response/response.proto";

option swift_prefix = "";
option java_multiple_files = true;

message CancelInstallationCompanyPermissionsRequest {
  string space_id = 1;
  string company_hex_id = 2;
}

message CancelInstallationCompanyPermissionsResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {

    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError space_armed = 3;
      common.response.DefaultError hub_locked = 4;
      common.response.SpaceLockedError space_locked = 5;
    }
  }
};
