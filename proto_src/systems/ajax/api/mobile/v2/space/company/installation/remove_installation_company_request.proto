syntax = "proto3";

package systems.ajax.api.mobile.v2.space.company.installation;

import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "";

message RemoveInstallationCompanyRequest {
  string company_hex_id = 1;
  string space_id = 2;
};

message RemoveInstallationCompanyResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {}

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError hub_locked = 3;
      common.response.DefaultError space_armed = 4;
      common.response.SpaceLockedError space_locked = 5;
      common.response.DefaultError company_has_subscriptions = 6;
    }
  }
};
