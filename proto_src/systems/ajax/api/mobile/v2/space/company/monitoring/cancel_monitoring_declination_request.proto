syntax = "proto3";

package systems.ajax.api.mobile.v2.space.company.monitoring;

import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "Space";

message CancelMonitoringDeclinationRequest {
  string company_hex_id = 1;
  string space_id = 2;
};

message CancelMonitoringDeclinationResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {}

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError permission_denied = 3;
      common.response.DefaultError space_armed = 4;
      common.response.SpaceLockedError space_locked = 5;
    }
  }
};
