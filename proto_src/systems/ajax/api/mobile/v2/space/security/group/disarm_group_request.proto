syntax = "proto3";

package systems.ajax.api.mobile.v2.space.security.group;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message DisarmSpaceGroupRequest {
  common.space.SpaceLocator space_locator = 1;

  string group_id = 2;
}

message DisarmSpaceGroupResponse {
  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError group_not_found = 3;
      common.response.DefaultError permission_denied = 4;
      common.response.DefaultError another_transition_is_in_progress = 5;
      common.response.DefaultError already_in_the_requested_security_state = 6;
      common.response.DefaultError illegal_space_security_mode = 7;
      common.response.DefaultError hub_offline = 8;
      common.response.HubBusyError hub_busy = 9;
      common.response.SpaceLockedError space_locked = 10;
      common.response.DefaultError hub_not_allowed_to_perform_command = 11;
    }
  }
}
