syntax = "proto3";

package systems.ajax.api.mobile.v2.space.security;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message SetSecurityModeRequest {
  common.space.SpaceLocator space_locator = 1;

  SecurityMode mode = 2;

  enum SecurityMode {
    NONE = 0;
    REGULAR = 1;
    GROUP = 2;
  }
}

message SetSecurityModeResponse {
  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError space_armed = 3;
      common.response.DefaultError space_without_groups = 4;
      common.response.DefaultError permission_denied = 5;
      common.response.DefaultError some_devices_without_groups = 6;
      common.response.DefaultError security_mode_already_enabled = 7;
      common.response.DefaultError hub_offline = 8;
      common.response.HubBusyError hub_busy = 9;
      common.response.DefaultError hub_error = 10;
      common.response.DefaultError hub_wrong_state = 11;
      common.response.SpaceLockedError space_locked = 12;
    }
  }
}
