syntax = "proto3";

package systems.ajax.api.mobile.v2.space.group;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message CreateGroupRequest {
  common.space.SpaceLocator space_locator = 1;

  string group_name = 2;

  optional string image_id = 3;
};

message CreateGroupResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    string group_id = 1;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError permission_denied = 3;
      common.response.DefaultError group_limit_exceeded = 4;
      common.response.DefaultError space_armed = 5;
      common.response.DefaultError hub_offline = 6;
      common.response.HubBusyError hub_busy = 7;
      common.response.SpaceLockedError space_locked = 8;
    }
  }
};
