syntax = "proto3";

package systems.ajax.api.mobile.v2.space.group;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/device/hub_device.proto";
import "systems/ajax/api/mobile/v2/common/space/device/video_edge_channel.proto";
import "systems/ajax/api/mobile/v2/common/space/device/smart_lock_device.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message AssignDevicesToGroupRequest {
  common.space.SpaceLocator space_locator = 1;

  string group_id = 2;

  repeated DeviceForGroup devices = 3;
}

message DeviceForGroup {
  oneof device {
    common.space.device.HubDevice hub_device = 1;
    common.space.device.VideoEdgeChannel video_edge_channel = 2;
    common.space.device.SmartLockDevice smart_lock = 3;
  }
}

message AssignDevicesToGroupResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError space_armed = 3;
      common.response.DefaultError permission_denied = 4;
      common.response.DefaultError group_not_found = 5;
      common.response.DefaultError devices_not_found = 6;
      common.response.DefaultError hub_offline = 7;
      common.response.HubBusyError hub_busy = 8;
      common.response.DefaultError hub_error = 9;
      common.response.DefaultError hub_wrong_state = 10;
      common.response.SpaceLockedError space_locked = 11;
    }
  }
};
