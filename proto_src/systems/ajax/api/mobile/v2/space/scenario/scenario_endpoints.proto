syntax = "proto3";

package systems.ajax.api.mobile.v2.space.scenario;

option java_multiple_files = true;
option swift_prefix = "Space";

import "systems/ajax/api/mobile/v2/space/scenario/create.proto";
import "systems/ajax/api/mobile/v2/space/scenario/update.proto";
import "systems/ajax/api/mobile/v2/space/scenario/delete.proto";
import "systems/ajax/api/mobile/v2/space/scenario/find_all.proto";

service ScenarioService {
  rpc create(CreateScenarioRequest)returns (CreateScenarioResponse);
  rpc update(UpdateScenarioRequest) returns (UpdateScenarioResponse);
  rpc delete(DeleteScenarioRequest) returns (DeleteScenarioResponse);
  rpc findAll(FindAllScenariosRequest) returns (FindAllScenariosResponse);
};
