syntax = "proto3";

package systems.ajax.api.mobile.v2.space.smartlock;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/smartlock/smart_lock.proto";

option java_multiple_files = true;
option swift_prefix = "";

message FindAllSmartLocksAvailableToAddRequest {
  string space_id = 1;

  common.space.smartlock.SmartLockType type = 3;
}

message FindAllSmartLocksAvailableToAddResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated common.space.smartlock.SmartLockAvailableToAdd smart_locks = 1;
  }

  message Failure {
    oneof error {
      common.response.DefaultError external_service_access_denied = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError bad_request = 3;
      common.response.DefaultError space_not_found = 4;
      common.response.DefaultError space_armed = 5;
    }
  }
}
