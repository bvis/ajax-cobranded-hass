syntax = "proto3";

package systems.ajax.api.mobile.v2.space.smartlock;

import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "";

message UnlockSmartLockRequest {
  string space_id = 1;

  string smart_lock_id = 2;
}

message UnlockSmartLockResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    string message = 100;

    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError space_not_found = 3;
      common.response.DefaultError smart_lock_not_found = 4;
      common.response.DefaultError external_service_access_denied = 5;
      common.response.DefaultError smart_lock_offline = 6;
    }
  }
}
