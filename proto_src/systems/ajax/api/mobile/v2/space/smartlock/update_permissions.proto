syntax = "proto3";

package systems.ajax.api.mobile.v2.space.smartlock;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/smartlock/smart_lock_permission.proto";
import "systems/ajax/api/mobile/v2/common/space/smartlock/smart_lock_device_permissions.proto";

option java_multiple_files = true;
option swift_prefix = "";

message UpdateSmartLockPermissionsRequest {
  string assignee_space_member_id = 1;
  string space_id = 2;
  string smart_lock_id = 3;
  repeated Update updates = 4;

  message Update {
    common.space.smartlock.SmartLockPermission permission = 1;

    bool enabled = 2;

    optional common.space.smartlock.SmartLockPermissions.PermissionState.Type type = 3;
  }
}

message UpdateSmartLockPermissionsResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    string message = 100;

    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError space_not_found = 3;
      common.response.DefaultError smart_lock_not_found = 4;
      common.response.DefaultError space_armed = 5;
      common.response.DefaultError member_not_found = 6;
    }
  }
}
