syntax = "proto3";

package systems.ajax.api.mobile.v2.space.smartlock;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/smartlock/smart_lock_in_space_update.proto";

option java_multiple_files = true;
option swift_prefix = "";

message UpdateSmartLockRequest {
  string space_id = 1;

  string smart_lock_id = 2;

  common.space.smartlock.SmartLockInSpaceUpdate update = 3;
}

message UpdateSmartLockResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    string message = 100;

    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError space_not_found = 3;
      common.response.DefaultError space_armed = 4;
      common.response.DefaultError room_not_found = 5;
      common.response.DefaultError smart_lock_not_found = 6;
      common.response.DefaultError external_service_access_denied = 7;
      common.response.DefaultError smart_lock_offline = 8;
    }
  }
}
