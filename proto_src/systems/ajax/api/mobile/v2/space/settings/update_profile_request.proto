syntax = "proto3";

package systems.ajax.api.mobile.v2.space.settings;

import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "";

message UpdateSpaceProfileRequest {
  string space_id = 1;
  Profile profile = 2;

  message Profile {
    string name = 1;
    optional string image_id = 2;
  }
};

message UpdateSpaceProfileResponse {
  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError permission_denied = 3;
      common.response.DefaultError space_armed = 4;
      common.response.SpaceLockedError space_locked = 5;
    }
  }
};
