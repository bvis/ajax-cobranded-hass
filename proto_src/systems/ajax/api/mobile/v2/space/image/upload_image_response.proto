syntax = "proto3";

package systems.ajax.api.mobile.v2.space.image;

import "systems/ajax/api/mobile/v2/common/image/image.proto";
import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "";

message UploadSpaceImageResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    common.image.Images images = 1;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError too_large_file = 2;
      common.response.DefaultError unsupported_format = 3;
    }
  }
}
