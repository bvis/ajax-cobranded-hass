syntax = "proto3";

package systems.ajax.api.mobile.v2.space.image;

option java_multiple_files = true;
option swift_prefix = "";

import "systems/ajax/api/mobile/v2/common/image/image_data_chunk.proto";

message SpaceImageChunk {
  oneof chunk {
    MetaChunk meta_chunk = 1;
    common.image.ImageDataChunk data_chunk = 2;
  }

  message MetaChunk {
    string file_name = 1;
    optional string space_id = 2;
  }
}
