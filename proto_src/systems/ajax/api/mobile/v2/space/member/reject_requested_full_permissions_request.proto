syntax = "proto3";

package systems.ajax.api.mobile.v2.space.member;

import "systems/ajax/api/mobile/v2/common/context/company.proto";
import "systems/ajax/api/mobile/v2/common/context/personal.proto";
import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message RejectRequestedFullPermissionsRequest {

  common.space.SpaceLocator space_locator = 1;

  string request_id = 2;

  oneof context {
    common.context.PersonalContext personal_context = 3;
    common.context.CompanyContext company_context = 4;
  }
};

message RejectRequestedFullPermissionsResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError permission_denied = 3;
      common.response.DefaultError request_expired = 4;
    }
  }
}
