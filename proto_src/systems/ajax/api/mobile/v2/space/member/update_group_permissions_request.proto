syntax = "proto3";

package systems.ajax.api.mobile.v2.space.member;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/member/group_permissions.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message UpdateSpaceMemberGroupPermissionsRequest {
  common.space.SpaceLocator space_locator = 1;

  repeated SpaceMemberGroupPermissions space_members_group_permissions = 2;
}

message SpaceMemberGroupPermissions {
  string space_member_id = 1;

  repeated common.space.member.GroupPermissions group_permissions = 2;
}

message UpdateSpaceMemberGroupPermissionsResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError permission_denied = 3;
      common.response.DefaultError space_armed = 4;
      common.response.DefaultError member_not_found = 5;
      common.response.DefaultError group_not_found = 6;
      common.response.DefaultError hub_is_offline = 7;
      common.response.DefaultError hub_error = 8;
      common.response.DefaultError hub_wrong_state = 9;
      common.response.SpaceLockedError space_locked = 10;
    }
  }
};
