syntax = "proto3";

package systems.ajax.api.mobile.v2.space;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message PressPanicButtonRequest {

  common.space.SpaceLocator space_locator = 1;
  optional Location location = 2;

  message Location {
    double latitude = 1;
    double longitude = 2;
    optional double horizontalAccuracy = 3;
    optional double speed = 4;
    optional int64 time = 5;
  }
};

message PressPanicButtonResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permissions_denied = 2;
      common.response.DefaultError space_not_found = 3;
      common.response.DefaultError action_is_limited_in_empty_space = 4;
      common.response.DefaultError hub_not_allowed_to_perform_command = 5;
    }
  }
};
