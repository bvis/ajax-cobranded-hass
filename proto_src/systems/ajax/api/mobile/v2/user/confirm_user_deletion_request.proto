syntax = "proto3";

package systems.ajax.api.mobile.v2.user;

import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "";

message ConfirmUserDeletionRequest {
  string phone_otp_code = 1;

  string email_otp_code = 2;
};

message ConfirmUserDeletionResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {

    oneof error {
      common.response.DefaultError otp_code_invalid = 1;
      common.response.DefaultError user_not_found = 2;
    }
  }
};
