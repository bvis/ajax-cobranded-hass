syntax = "proto3";

package systems.ajax.api.mobile.v2.user.pending;

import "systems/ajax/logging/proto/formatting_options.proto";
import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "";

message DeletePendingInvitationRequest {
  string space_id = 1;
  string email = 2 [(hash_value) = true];
};

message DeletePendingInvitationResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError permission_denied = 3;
    }
  }
};
