syntax = "proto3";

package systems.ajax.api.mobile.v2.connectivity;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option swift_prefix = "";

message PingPongRequest {
    google.protobuf.Timestamp timestamp = 1;
}

message PingPongResponse {
    google.protobuf.Timestamp ping_timestamp = 1;
    google.protobuf.Timestamp server_timestamp = 2;
}
