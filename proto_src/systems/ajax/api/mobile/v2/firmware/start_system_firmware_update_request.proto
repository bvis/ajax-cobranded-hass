syntax = "proto3";

package systems.ajax.api.mobile.v2.firmware;

import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "";

message StartSystemFirmwareUpdateRequest {
  string hub_id = 1;
}

message StartSystemFirmwareUpdateResponse {
  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    string message = 100;

    oneof error {
      systems.ajax.api.mobile.v2.common.response.DefaultError no_update_available = 1;
      systems.ajax.api.mobile.v2.common.response.DefaultError hub_offline = 2;
    }
  }
}
