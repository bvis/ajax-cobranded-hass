syntax = "proto3";

package systems.ajax.api.mobile.v2.hub;

import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";
import "systems/ajax/api/mobile/v2/common/response/response.proto";

option java_multiple_files = true;
option swift_prefix = "";

message TransferHubSettingsRequest {
  common.space.SpaceLocator space_locator = 1;

  string donor_hub_id = 2;

  string target_hub_qr_code = 3;

  bool accept_snatch_hub = 4;
}

message TransferHubSettingsResponse {
  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError space_not_found = 3;
      common.response.SpaceLockedError space_locked = 4;
      common.response.LimitExceededError passive_hubs_limit_exceeded = 5;
      common.response.DefaultError hub_in_use = 6;
      common.response.DefaultError hub_already_in_space = 7;
      common.response.DefaultError target_hub_not_found = 8;
      common.response.DefaultError hub_qr_code_invalid = 9;
      common.response.DefaultError hub_claim_error = 10;
      common.response.DefaultError hub_not_empty = 11;
      common.response.DefaultError hub_error = 12;
      common.response.DefaultError hub_wrong_state = 13;
      common.response.HubBusyError hub_busy = 14;
      common.response.DefaultError member_not_support_add_fibra_and_hybrid_hub = 15;
      common.response.DefaultError member_not_authorized_add_hub = 16;
      common.response.DefaultError member_not_authorized_add_fibra_and_hybrid_hub = 17;
      common.response.DefaultError hub_locked_by_another_company = 18;
      common.response.DefaultError target_hub_space_on_monitoring = 19;
      TransferHubSettingsValidationErrors transfer_hub_settings_validation_errors = 30;
      common.response.DefaultError donor_hub_has_active_subscriptions = 31;
      common.response.DefaultError donor_hub_has_active_subscriptions_for_member = 32;
      common.response.DefaultError target_hub_has_active_subscriptions = 33;
      common.response.DefaultError target_hub_has_active_subscriptions_for_member = 34;
      common.response.DefaultError illegal_donor_hub_service_state = 35;
    }

    message TransferHubSettingsValidationErrors {
      repeated TransferHubSettingsValidationError error = 1;

      message TransferHubSettingsValidationError {
        oneof error {
          common.response.DefaultError target_permission_denied = 1;
          common.response.DefaultError target_armed = 2;
          common.response.DefaultError target_state_fetch_failed = 3;
          common.response.DefaultError target_offline = 4;
          common.response.DefaultError target_in_migration = 5;
          common.response.DefaultError target_firmware_lower_minimal = 6;
          common.response.DefaultError target_firmware_lower_donor = 7;
          common.response.DefaultError target_users_limit_exceeded = 8;
          common.response.DefaultError donor_permission_denied = 9;
          common.response.DefaultError donor_state_fetch_failed = 10;
          common.response.DefaultError donor_target_incompatible_types = 11;
          common.response.DefaultError donor_firmware_lower_minimal = 12;
          common.response.DefaultError donor_in_migration = 13;
          common.response.DefaultError donor_online = 14;
        }
      }
    }
  }
}
