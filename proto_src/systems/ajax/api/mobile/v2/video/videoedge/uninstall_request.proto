syntax = "proto3";

package systems.ajax.api.mobile.v2.video.videoedge;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message UninstallVideoEdgeRequest {
  common.space.SpaceLocator space_locator = 1;
  string video_edge_id = 2;
}

message UninstallVideoEdgeResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError permission_denied = 3;
      common.response.DefaultError video_edge_not_found = 4;
      common.response.DefaultError space_armed = 5;
      common.response.SpaceLockedError space_locked = 6;
      common.response.DefaultError unable_to_remove_backup_channel = 7;
      common.response.DefaultError video_edge_has_subscriptions = 8;
      // Has subscriptions activated by initiator
      common.response.DefaultError video_edge_has_subscriptions_member = 9;
    }
  }
}
