syntax = "proto3";

package systems.ajax.api.mobile.v2.video.videoedge;

option java_multiple_files = true;
option swift_prefix = "";

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/video/videoedge/mediadevice/media_device_settings.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

message SetMediaDeviceDesiredSettingsRequest {
  // [required]
  string video_edge_id = 1;

  // [required]
  string media_device_id = 2;

  // [required]
  common.video.videoedge.mediadevice.ChannelSettings channel_settings = 3;

  // replaced space_id field with space locator
  reserved 20;

  // [optional] - temporarily for backward compatibility
  common.space.SpaceLocator space_locator = 21;
};

message SetMediaDeviceDesiredSettingsResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {}

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError space_armed = 3;
      common.response.DefaultError video_edge_not_found = 4;
      common.response.DefaultError device_not_found = 5;
      common.response.DefaultError device_unavailable = 6;
      common.response.DefaultError device_setup_in_progress = 7;
      common.response.DefaultError channel_not_found = 8;
      common.response.DefaultError video_edge_is_offline = 9;
    }
  }
};
