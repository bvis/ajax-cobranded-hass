syntax = "proto3";

package systems.ajax.api.mobile.v2.video.videoedge.network;

import "google/protobuf/duration.proto";
import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/video/videoedge/network/network_interface.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message SetNetworkDesiredConfigurationRequest {
  // [required]
  string video_edge_id = 1;

  // [required]
  string network_interface_id = 2;

  // [required]
  common.video.videoedge.network.NetworkConfiguration desired_configuration = 3;

  // [optional] - will become required once the client apps are adjusted accordingly
  common.space.SpaceLocator space_locator = 4;
}

message SetNetworkDesiredConfigurationResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    string requestId = 1;

    google.protobuf.Duration network_configuration_timeout = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError space_armed = 3;
      common.response.DefaultError video_edge_not_found = 4;
      common.response.DefaultError network_interface_not_found = 5;
      common.response.DefaultError network_interface_configuration_in_progress = 6;
      common.response.DefaultError video_edge_is_offline = 7;
    }
  }
}
