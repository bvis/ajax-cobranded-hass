syntax = "proto3";

package systems.ajax.api.mobile.v2.video.videoedge.storage;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message FormatStorageRequest {
  string video_edge_id = 1;

  string storage_device_id = 2;

  // [optional] - will become required once the client apps are adjusted accordingly
  common.space.SpaceLocator space_locator = 3;
}

message FormatStorageResponse {

  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError video_edge_not_found = 3;
      common.response.DefaultError space_not_disarmed = 4;
      common.response.DefaultError storage_device_not_found = 5;
      common.response.DefaultError video_edge_is_offline = 6;
    }
  }
}
