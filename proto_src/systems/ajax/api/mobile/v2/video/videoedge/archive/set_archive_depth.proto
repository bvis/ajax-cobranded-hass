syntax = "proto3";

package systems.ajax.api.mobile.v2.video.videoedge.archive;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/video/videoedge/archive/archive.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message SetArchiveDepthRequest {
  string video_edge_id = 1;

  common.video.videoedge.archive.MaxRingDepth max_ring_depth = 2;

  // [optional] - temporarily for backward compatibility
  common.space.SpaceLocator space_locator = 20;
}

message SetArchiveDepthResponse {
  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError video_edge_not_found = 3;
      common.response.DefaultError space_armed = 4;
      common.response.DefaultError video_edge_is_offline = 5;
    }
  }
}
