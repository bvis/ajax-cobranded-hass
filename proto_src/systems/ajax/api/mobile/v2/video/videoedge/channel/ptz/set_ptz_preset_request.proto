syntax = "proto3";

package systems.ajax.api.mobile.v2.video.videoedge.channel.ptz;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message SetChannelPtzPresetRequest {
  // [required]
  common.space.SpaceLocator space_locator = 1;

  // [required]
  string video_edge_id = 2;

  // [required]
  string channel_id = 3;

  // [required]
  string preset_name = 4;
}

message SetChannelPtzPresetResponse {
  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError permission_denied = 3;
      common.response.DefaultError video_edge_not_found = 4;
      common.response.DefaultError channel_not_found = 5;
      common.response.DefaultError ptz_operation_not_supported = 6;
      common.response.DefaultError ptz_temporary_unavailable = 7;
      common.response.DefaultError ptz_presets_limit_exceeded = 8;
      common.response.DefaultError video_edge_is_offline = 9;
    }
  }
}
