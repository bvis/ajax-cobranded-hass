syntax = "proto3";

package systems.ajax.api.mobile.v2.video.videoedge;

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/video/videoedge/about/about.proto";

option java_multiple_files = true;
option swift_prefix = "";

message GetVideoEdgeAboutRequest {
  // [required] only if the QR code is not specified, will be removed once the apps migrate to QR codes
  string video_edge_id = 1 [deprecated = true];

  // [optional] will become required once the apps migrate to QR codes
  string video_edge_qr_code = 2;
};

message GetVideoEdgeAboutResponse {

  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    common.video.videoedge.about.About about = 1;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError video_edge_not_found = 2;
    }
  }
};
