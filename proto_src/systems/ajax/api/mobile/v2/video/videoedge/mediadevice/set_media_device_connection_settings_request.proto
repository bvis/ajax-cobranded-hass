syntax = "proto3";

package systems.ajax.api.mobile.v2.video.videoedge.mediadevice;

import "systems/ajax/api/mobile/v2/common/video/videoedge/mediadevice/media_device.proto";
import "systems/ajax/api/mobile/v2/common/video/videoedge/mediadevice/media_device_settings.proto";
import "systems/ajax/api/mobile/v2/common/video/videoedge/mediadevice/media_device_capabilities.proto";
import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

option java_multiple_files = true;
option swift_prefix = "";

message SetMediaDeviceConnectionSettingsRequest {
  string video_edge_id = 1;

  string media_device_id = 2;

  common.video.videoedge.mediadevice.ConnectionSettings connection_settings = 3;

  // replaced space_id field with space locator
  reserved 20;

  // [optional] - temporarily for backward compatibility
  common.space.SpaceLocator space_locator = 21;
}

message SetMediaDeviceConnectionSettingsResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    common.video.videoedge.mediadevice.MediaDeviceCapabilities capabilities = 1;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError permission_denied = 2;
      common.response.DefaultError space_armed = 3;
      common.response.DefaultError video_edge_not_found = 4;
      common.response.DefaultError device_not_found = 5;
      ConnectionFailedError connection_failed = 6;
      common.response.DefaultError video_edge_is_offline = 7;
    }

    message ConnectionFailedError {
      common.video.videoedge.mediadevice.MediaDeviceState media_device_state = 1;
    }
  }
}
