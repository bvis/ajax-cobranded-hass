syntax = "proto3";

package systems.ajax.api.mobile.v2.video.scenario;

option java_multiple_files = true;
option swift_prefix = "";

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";

message DeleteScenarioRequest {
  string scenario_id = 1;

  // [optional] - temporarily for backward compatibility
  common.space.SpaceLocator space_locator = 20;
}

message DeleteScenarioResponse {
  oneof response {
    common.response.Success success = 1;
    Failure failure = 2;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError permission_denied = 3;
      common.response.DefaultError space_armed = 4;
      common.response.DefaultError scenario_not_found = 5;
      common.response.SpaceLockedError space_locked = 6;
    }
  }
}
