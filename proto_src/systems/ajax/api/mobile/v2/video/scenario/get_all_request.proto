syntax = "proto3";

package systems.ajax.api.mobile.v2.video.scenario;

option java_multiple_files = true;
option swift_prefix = "";

import "systems/ajax/api/mobile/v2/common/response/response.proto";
import "systems/ajax/api/mobile/v2/common/space/space_locator.proto";
import "systems/ajax/api/mobile/v2/common/video/scenario/video_scenario.proto";

message GetAllScenariosRequest {
  common.space.SpaceLocator space_locator = 1;
}

message GetAllScenariosResponse {
  oneof response {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    repeated common.video.scenario.VideoScenario scenario = 1;
  }

  message Failure {
    oneof error {
      common.response.DefaultError bad_request = 1;
      common.response.DefaultError space_not_found = 2;
      common.response.DefaultError permission_denied = 3;
      common.response.DefaultError space_armed = 4;
    }
  }
}
