syntax = "proto3";
import "systems/ajax/mobile/v2/service/hub/company/privacy/change_survelilance_cameras_company_access.proto";
import "systems/ajax/mobile/v2/service/hub/company/privacy/change_photo_on_demand_company_access.proto";

package systems.ajax.mobile.v2.service.hub.company.privacy;

option java_multiple_files = true;
option java_generic_services = true;
option java_package = "systems.ajax.mobile.v2.service.hub.company.privacy";
option swift_prefix = "";


service HubPrivacyService {
  rpc setMotionCamPrivacyCompanyAccess (ChangePhotoOnDemandCompanyAccessRequest) returns (ChangePhotoOnDemandCompanyAccessResponse);
  rpc setStreamingCamPrivacyCompanyAccess (ChangeSurveillanceCamerasCompanyAccessRequest) returns (ChangeSurveillanceCamerasCompanyAccessResponse);
}
